  <script>
    function parseMarkdown(md) {
      let html = md
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      // Code blocks
      html = html.replace(/```([\s\S]*?)```/g, (_, code) => '<pre><code>' + code.trim() + '</code></pre>');
      // Inline code
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      // Headings
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      // Horizontal rule
      html = html.replace(/^---$/gm, '<hr>');
      // Blockquote
      html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
      // Bold and italic
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
      // Images (sanitize javascript: protocol)
      html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, function(m, alt, src) {
        if (/^\s*javascript\s*:/i.test(src)) return alt;
        return '<img src="' + src + '" alt="' + alt + '">';
      });
      // Links (sanitize javascript: protocol to prevent XSS)
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function(m, text, url) {
        if (/^\s*javascript\s*:/i.test(url)) return text;
        return '<a href="' + url + '" target="_blank">' + text + '</a>';
      });
      // Unordered lists
      html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
      html = html.replace(/((<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
      // Paragraphs
      html = html.split('\n\n').map(block => {
        const trimmed = block.trim();
        if (!trimmed) return '';
        if (/^<[hupob]|^<li|^<hr|^<pre|^<block/i.test(trimmed)) return trimmed;
        return '<p>' + trimmed.replace(/\n/g, '<br>') + '</p>';
      }).join('\n');
      return html;
    }
    const input = document.getElementById('md-input');
    const preview = document.getElementById('preview');
    function update() { preview.innerHTML = parseMarkdown(input.value); }
    input.addEventListener('input', update);
    update();
  </script>
