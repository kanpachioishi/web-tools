  <main>
    <h1>ポモドーロタイマー</h1>
    <h2>集中力を高める作業タイマー</h2>
    <p class="tool-description">ポモドーロ・テクニックで効率的に作業しましょう。25分集中→5分休憩のサイクルで生産性アップ。作業時間・休憩時間はカスタマイズ可能。通知音とブラウザ通知に対応。無料・登録不要です。</p>

    <div class="tool-area">
      <div class="timer-container">
        <div class="timer-circle">
          <svg viewBox="0 0 280 280">
            <circle class="bg-ring" cx="140" cy="140" r="124"></circle>
            <circle class="progress-ring progress-work" id="progress-ring" cx="140" cy="140" r="124"
              stroke-dasharray="779.2" stroke-dashoffset="0"></circle>
          </svg>
          <div class="timer-display">
            <div class="timer-time" id="timer-time">25:00</div>
            <div class="timer-phase phase-work" id="timer-phase">作業</div>
          </div>
        </div>

        <div class="timer-controls">
          <button class="btn" id="btn-start" onclick="startTimer()">開始</button>
          <button class="btn btn-secondary" id="btn-pause" onclick="pauseTimer()" style="display:none;">一時停止</button>
          <button class="btn btn-secondary" id="btn-reset" onclick="resetTimer()">リセット</button>
        </div>

        <div class="session-count">
          <div>セッション進捗</div>
          <div class="session-dots" id="session-dots"></div>
          <div class="completed-count" id="completed-count">今日 0 ポモドーロ完了</div>
        </div>

        <div class="settings-panel">
          <button class="settings-toggle" onclick="toggleSettings()">
            <span>設定</span>
            <span id="settings-arrow">&#9660;</span>
          </button>
          <div class="settings-body" id="settings-body">
            <div class="setting-row">
              <span class="setting-label">作業時間</span>
              <div class="setting-control">
                <input type="number" id="set-work" value="25" min="15" max="60">
                <span class="setting-unit">分</span>
              </div>
            </div>
            <div class="setting-row">
              <span class="setting-label">短い休憩</span>
              <div class="setting-control">
                <input type="number" id="set-short-break" value="5" min="3" max="10">
                <span class="setting-unit">分</span>
              </div>
            </div>
            <div class="setting-row">
              <span class="setting-label">長い休憩</span>
              <div class="setting-control">
                <input type="number" id="set-long-break" value="15" min="15" max="30">
                <span class="setting-unit">分</span>
              </div>
            </div>
            <div class="setting-row">
              <span class="setting-label">長休憩までのセッション数</span>
              <div class="setting-control">
                <input type="number" id="set-sessions" value="4" min="2" max="6">
                <span class="setting-unit">回</span>
              </div>
            </div>
            <div class="setting-row">
              <button class="btn" onclick="applySettings()" style="width:100%;">設定を適用</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <section style="margin-top:40px;">

        </a>
        <a href="../password-generator/" class="tool-card">
          <h3 style="font-size:1rem;margin:0;">パスワード生成ツール</h3>
          <p>安全なパスワードをワンクリック生成</p>
        </a>
        <a href="../unit-converter/" class="tool-card">
          <h3 style="font-size:1rem;margin:0;">単位変換ツール</h3>

  <script src="../../common/footer.js"></script>
  <script>
    // Timer state
    var workDuration = 25 * 60;
    var shortBreakDuration = 5 * 60;
    var longBreakDuration = 15 * 60;
    var sessionsBeforeLong = 4;

    var timeRemaining = workDuration;
    var totalTime = workDuration;
    var timerInterval = null;
    var isRunning = false;
    var currentPhase = 'work'; // 'work', 'break', 'long-break'
    var currentSession = 0;
    var completedToday = 0;

    var circumference = 2 * Math.PI * 124; // ~779.2

    // Initialize
    updateDisplay();
    renderSessionDots();
    requestNotificationPermission();

    function requestNotificationPermission() {
      if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
      }
    }

    function startTimer() {
      if (isRunning) return;
      isRunning = true;
      document.getElementById('btn-start').style.display = 'none';
      document.getElementById('btn-pause').style.display = '';

      timerInterval = setInterval(function() {
        timeRemaining--;
        if (timeRemaining < 0) {
          timeRemaining = 0;
          clearInterval(timerInterval);
          timerInterval = null;
          isRunning = false;
          onPhaseComplete();
          return;
        }
        updateDisplay();
        updateTitle();
      }, 1000);
    }

    function pauseTimer() {
      if (!isRunning) return;
      isRunning = false;
      clearInterval(timerInterval);
      timerInterval = null;
      document.getElementById('btn-start').textContent = '再開';
      document.getElementById('btn-start').style.display = '';
      document.getElementById('btn-pause').style.display = 'none';
    }

    function resetTimer() {
      isRunning = false;
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
      currentPhase = 'work';
      currentSession = 0;
      timeRemaining = workDuration;
      totalTime = workDuration;
      document.getElementById('btn-start').textContent = '開始';
      document.getElementById('btn-start').style.display = '';
      document.getElementById('btn-pause').style.display = 'none';
      updateDisplay();
      renderSessionDots();
      document.title = 'ポモドーロタイマー - 集中力を高める作業タイマー｜SimpleToolkit';
    }

    function onPhaseComplete() {
      playBeep();
      if (currentPhase === 'work') {
        currentSession++;
        completedToday++;
        document.getElementById('completed-count').textContent = '今日 ' + completedToday + ' ポモドーロ完了';
        renderSessionDots();

        if (currentSession >= sessionsBeforeLong) {
          currentPhase = 'long-break';
          timeRemaining = longBreakDuration;
          totalTime = longBreakDuration;
          currentSession = 0;
          showNotification('長い休憩の時間です！', sessionsBeforeLong + 'セッション完了。ゆっくり休みましょう。');
        } else {
          currentPhase = 'break';
          timeRemaining = shortBreakDuration;
          totalTime = shortBreakDuration;
          showNotification('休憩の時間です！', '短い休憩を取りましょう。');
        }
      } else {
        currentPhase = 'work';
        timeRemaining = workDuration;
        totalTime = workDuration;
        showNotification('作業の時間です！', '集中して取り組みましょう。');
        renderSessionDots();
      }

      updateDisplay();
      document.getElementById('btn-start').textContent = '開始';
      document.getElementById('btn-start').style.display = '';
      document.getElementById('btn-pause').style.display = 'none';
    }

    function updateDisplay() {
      var minutes = Math.floor(timeRemaining / 60);
      var seconds = timeRemaining % 60;
      var timeStr = (minutes < 10 ? '0' : '') + minutes + ':' + (seconds < 10 ? '0' : '') + seconds;
      document.getElementById('timer-time').textContent = timeStr;

      // Phase label
      var phaseEl = document.getElementById('timer-phase');
      var ring = document.getElementById('progress-ring');
      ring.className.baseVal = 'progress-ring';
      if (currentPhase === 'work') {
        phaseEl.textContent = '作業';
        phaseEl.className = 'timer-phase phase-work';
        ring.classList.add('progress-work');
      } else if (currentPhase === 'break') {
        phaseEl.textContent = '休憩';
        phaseEl.className = 'timer-phase phase-break';
        ring.classList.add('progress-break');
      } else {
        phaseEl.textContent = '長い休憩';
        phaseEl.className = 'timer-phase phase-long-break';
        ring.classList.add('progress-long-break');
      }

      // Progress ring
      var progress = totalTime > 0 ? timeRemaining / totalTime : 0;
      var offset = circumference * (1 - progress);
      ring.style.strokeDashoffset = offset;
    }

    function updateTitle() {
      var minutes = Math.floor(timeRemaining / 60);
      var seconds = timeRemaining % 60;
      var timeStr = (minutes < 10 ? '0' : '') + minutes + ':' + (seconds < 10 ? '0' : '') + seconds;
      var phaseStr = currentPhase === 'work' ? '作業' : currentPhase === 'break' ? '休憩' : '長い休憩';
      document.title = timeStr + ' - ' + phaseStr + ' | ポモドーロタイマー';
    }

    function renderSessionDots() {
      var container = document.getElementById('session-dots');
      container.innerHTML = '';
      for (var i = 0; i < sessionsBeforeLong; i++) {
        var dot = document.createElement('div');
        dot.className = 'session-dot' + (i < currentSession ? ' completed' : '');
        container.appendChild(dot);
      }
    }

    function toggleSettings() {
      var body = document.getElementById('settings-body');
      var arrow = document.getElementById('settings-arrow');
      if (body.classList.contains('open')) {
        body.classList.remove('open');
        arrow.innerHTML = '&#9660;';
      } else {
        body.classList.add('open');
        arrow.innerHTML = '&#9650;';
      }
    }

    function applySettings() {
      var w = parseInt(document.getElementById('set-work').value) || 25;
      var sb = parseInt(document.getElementById('set-short-break').value) || 5;
      var lb = parseInt(document.getElementById('set-long-break').value) || 15;
      var s = parseInt(document.getElementById('set-sessions').value) || 4;

      w = Math.min(60, Math.max(15, w));
      sb = Math.min(10, Math.max(3, sb));
      lb = Math.min(30, Math.max(15, lb));
      s = Math.min(6, Math.max(2, s));

      workDuration = w * 60;
      shortBreakDuration = sb * 60;
      longBreakDuration = lb * 60;
      sessionsBeforeLong = s;

      // Reset timer with new settings
      resetTimer();
      toggleSettings();
    }

    function playBeep() {
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var frequencies = [880, 0, 880, 0, 880];
        var durations = [0.15, 0.1, 0.15, 0.1, 0.3];
        var startTime = ctx.currentTime;
        for (var i = 0; i < frequencies.length; i++) {
          if (frequencies[i] > 0) {
            var osc = ctx.createOscillator();
            var gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = frequencies[i];
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.3, startTime);
            gain.gain.exponentialRampToValueAtTime(0.01, startTime + durations[i]);
            osc.start(startTime);
            osc.stop(startTime + durations[i]);
          }
          startTime += durations[i];
        }
      } catch (e) {}
    }

    function showNotification(title, body) {
      if ('Notification' in window && Notification.permission === 'granted') {
        new Notification(title, { body: body, icon: '' });
      }
    }
  </script>
