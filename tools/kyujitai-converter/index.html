    function toKyujitai() {
      var input = document.getElementById('input-text').value;
      var output = '';
      var count = 0;
      for (var i = 0; i < input.length; i++) {
        var ch = input[i];
        if (MAPPING[ch]) {
          output += MAPPING[ch];
          count++;
        } else {
          output += ch;
        }
      }
      document.getElementById('output-text').value = output;
      updateCounts(count);
    }

    function toShinjitai() {
      var input = document.getElementById('input-text').value;
      var output = '';
      var count = 0;
      for (var i = 0; i < input.length; i++) {
        var ch = input[i];
        if (REVERSE_MAPPING[ch]) {

          count++;
        } else {
          output += ch;
        }
      }
      document.getElementById('output-text').value = output;
      updateCounts(count);

      var inputEl = document.getElementById('input-text');
      var outputEl = document.getElementById('output-text');
      var tmp = inputEl.value;
      inputEl.value = outputEl.value;
      outputEl.value = tmp;
      updateInputCount();

      var outputLen = document.getElementById('output-text').value.length;
      document.getElementById('output-count').textContent = outputLen + '文字';

      var tbody = document.getElementById('char-table-body');
      var uniqueKeys = [];
      var seen = {};
      for (var k in MAPPING) {
        if (MAPPING.hasOwnProperty(k) && !seen[k] && MAPPING[k] !== k) {
          seen[k] = true;
          uniqueKeys.push(k);
        }
      }
      // Sort by code point
      uniqueKeys.sort(function(a, b) { return a.charCodeAt(0) - b.charCodeAt(0); });

      // Show first 100 most common
      var common = ['亜','悪','圧','囲','為','壱','隠','栄','営','衛','駅','円','塩','奥','応','横','欧','穏',

      var displayed = [];
      for (var i = 0; i < common.length; i++) {
        if (MAPPING[common[i]] && MAPPING[common[i]] !== common[i]) {
          displayed.push(common[i]);
        }
      }

      for (var j = 0; j < displayed.length; j++) {
        var shin = displayed[j];
        var kyu = MAPPING[shin];
        var tr = document.createElement('tr');
        tr.setAttribute('data-shin', shin);
        tr.setAttribute('data-kyu', kyu);
        var example = EXAMPLES[shin] || '';
        tr.innerHTML = '<td>' + shin + '</td><td>' + kyu + '</td><td style="font-size:0.85rem;">' + example + '</td>';
        tbody.appendChild(tr);
      }
    }

    function filterTable() {
      var query = document.getElementById('table-search').value;
      var rows = document.getElementById('char-table-body').querySelectorAll('tr');
      for (var i = 0; i < rows.length; i++) {
        var shin = rows[i].getAttribute('data-shin');
        var kyu = rows[i].getAttribute('data-kyu');
        if (!query || shin.indexOf(query) >= 0 || kyu.indexOf(query) >= 0) {
          rows[i].style.display = '';
        } else {
          rows[i].style.display = 'none';
        }
      }
    }

    buildTable();
  </script>
</body>
</html>
