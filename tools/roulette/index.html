  <script>
    var canvas = document.getElementById('roulette-canvas');
    var ctx = canvas.getContext('2d');
    var itemsInput = document.getElementById('items-input');
    var spinBtn = document.getElementById('spin-btn');
    var currentAngle = 0;
    var isSpinning = false;
    var history = [];

    // Beautiful color palette
    var COLORS = [
      '#e11d48', '#2563eb', '#16a34a', '#f59e0b', '#8b5cf6',
      '#06b6d4', '#ec4899', '#84cc16', '#f97316', '#6366f1',
      '#14b8a6', '#ef4444', '#3b82f6', '#a855f7', '#eab308',
      '#22c55e', '#d946ef', '#0ea5e9', '#f43f5e', '#10b981'
    ];

    function getItems() {
      var lines = itemsInput.value.split('\n');
      var items = [];
      for (var i = 0; i < lines.length; i++) {
        var t = lines[i].trim();
        if (t !== '') items.push(t);
      }
      return items;
    }

    function updateItemsCount() {
      var items = getItems();
      var countEl = document.getElementById('items-count');
      if (items.length < 2) {
        countEl.textContent = '項目数: ' + items.length + '（2個以上必要です）';
        countEl.className = 'items-count error';
      } else if (items.length > 20) {
        countEl.textContent = '項目数: ' + items.length + '（20個以下にしてください）';
        countEl.className = 'items-count error';
      } else {
        countEl.textContent = '項目数: ' + items.length;
        countEl.className = 'items-count';
      }
    }

    function drawWheel(items, angle) {
      var w = canvas.width;
      var h = canvas.height;
      var cx = w / 2;
      var cy = h / 2;
      var r = Math.min(cx, cy) - 10;
      var n = items.length;
      var sliceAngle = (2 * Math.PI) / n;

      ctx.clearRect(0, 0, w, h);

      // Draw slices
      for (var i = 0; i < n; i++) {
        var startAngle = angle + i * sliceAngle;
        var endAngle = startAngle + sliceAngle;

        // Slice fill
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, startAngle, endAngle);
        ctx.closePath();
        ctx.fillStyle = COLORS[i % COLORS.length];
        ctx.fill();

        // Slice border
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, startAngle, endAngle);
        ctx.closePath();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Text
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(startAngle + sliceAngle / 2);
        ctx.textAlign = 'right';
        ctx.fillStyle = '#fff';
        ctx.font = 'bold ' + Math.min(16, Math.max(10, Math.floor(200 / n))) + 'px sans-serif';
        ctx.shadowColor = 'rgba(0,0,0,0.4)';
        ctx.shadowBlur = 3;

        var label = items[i];
        var maxLen = n <= 4 ? 10 : (n <= 8 ? 7 : 5);
        if (label.length > maxLen) label = label.substring(0, maxLen) + '...';
        ctx.fillText(label, r - 14, 5);
        ctx.restore();
      }

      // Center circle
      ctx.beginPath();
      ctx.arc(cx, cy, 22, 0, 2 * Math.PI);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.strokeStyle = '#e2e8f0';
      ctx.lineWidth = 3;
      ctx.stroke();

      // Outer ring
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, 2 * Math.PI);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 4;
      ctx.stroke();
    }

    function spin() {
      if (isSpinning) return;

      var items = getItems();
      if (items.length < 2) {
        alert('項目を2個以上入力してください。');
        return;
      }
      if (items.length > 20) {
        alert('項目は20個以下にしてください。');
        return;
      }

      isSpinning = true;
      spinBtn.disabled = true;

      var n = items.length;
      var sliceAngle = (2 * Math.PI) / n;

      // Random target: 5-8 full rotations + random position
      var fullRotations = (5 + Math.random() * 3) * 2 * Math.PI;
      var randomSlice = Math.floor(Math.random() * n);
      // Target angle: pointer is at top (270deg = -PI/2)
      // We need the middle of the target slice to end up at the top
      var targetSliceCenter = randomSlice * sliceAngle + sliceAngle / 2;
      // The pointer is at the top (-PI/2), but in canvas 0 is right,
      // so "top" in our rotation corresponds to -PI/2
      // We want: currentAngle + totalSpin + targetSliceCenter = -PI/2 + 2*PI*k
      // Actually the wheel rotates, and the pointer reads from top.
      // The winning slice is the one at -PI/2 (top).
      // After rotation by totalAngle, slice i starts at totalAngle + i*sliceAngle
      // For slice randomSlice to be at the pointer (-PI/2):
      // totalAngle + randomSlice*sliceAngle + sliceAngle/2 ≡ -PI/2 (mod 2PI)
      // totalAngle = -PI/2 - targetSliceCenter (mod 2PI)
      var finalAngle = -Math.PI / 2 - targetSliceCenter;
      // Normalize to positive range
      finalAngle = ((finalAngle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
      var totalSpin = fullRotations + (finalAngle - ((currentAngle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI));
      if (totalSpin < fullRotations) totalSpin += 2 * Math.PI;

      var startAngle = currentAngle;
      var startTime = null;
      var duration = 4000 + Math.random() * 1000; // 4-5 seconds

      function easeOutCubic(t) {
        return 1 - Math.pow(1 - t, 3);
      }

      function animate(timestamp) {
        if (!startTime) startTime = timestamp;
        var elapsed = timestamp - startTime;
        var progress = Math.min(elapsed / duration, 1);
        var easedProgress = easeOutCubic(progress);

        currentAngle = startAngle + totalSpin * easedProgress;
        drawWheel(items, currentAngle);

        if (progress < 1) {
          requestAnimationFrame(animate);
        } else {
          // Spin complete
          isSpinning = false;
          spinBtn.disabled = false;

          // Show result
          var resultItem = items[randomSlice];
          showResult(resultItem);
          addHistory(resultItem);
        }
      }

      requestAnimationFrame(animate);
    }

    function showResult(text) {
      document.getElementById('result-text').textContent = text;
      document.getElementById('result-overlay').classList.add('show');
    }

    function closeResult(event) {
      if (event && event.target !== document.getElementById('result-overlay')) return;
      document.getElementById('result-overlay').classList.remove('show');
    }

    function addHistory(item) {
      history.unshift(item);
      if (history.length > 10) history.pop();
      renderHistory();
    }

    function renderHistory() {
      var list = document.getElementById('history-list');
      if (history.length === 0) {
        list.innerHTML = '<li class="history-empty">まだ結果がありません</li>';
        return;
      }
      var html = '';
      for (var i = 0; i < history.length; i++) {
        html += '<li><span class="history-num">#' + (i + 1) + '</span><span class="history-value">' + escapeHtml(history[i]) + '</span></li>';
      }
      list.innerHTML = html;
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Initialize
    itemsInput.addEventListener('input', function() {
      updateItemsCount();
      if (!isSpinning) {
        drawWheel(getItems(), currentAngle);
      }
    });

    // Close popup with Escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        document.getElementById('result-overlay').classList.remove('show');
      }
    });

    // Initial draw
    updateItemsCount();
    drawWheel(getItems(), currentAngle);
  </script>
</body>
