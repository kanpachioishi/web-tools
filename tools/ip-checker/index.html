    <h1>IPアドレス確認</h1>

        </div>

        </div>

          <table style="width:100%;border-collapse:collapse;">

            <tr><td style="padding:8px;font-weight:bold;border-top:1px solid #dee2e6;">16進数表記</td><td id="ip-hex" style="padding:8px;font-family:monospace;border-top:1px solid #dee2e6;">-</td></tr>
            <tr><td style="padding:8px;font-weight:bold;border-top:1px solid #dee2e6;">10進数表記</td><td id="ip-decimal" style="padding:8px;font-family:monospace;border-top:1px solid #dee2e6;">-</td></tr>

  <script>
    function analyzeIPv4(ip) {
      const parts = ip.split('.').map(Number);
      // Class
      let ipClass = '-';
      if (parts[0] <= 127) ipClass = 'クラスA';
      else if (parts[0] <= 191) ipClass = 'クラスB';
      else if (parts[0] <= 223) ipClass = 'クラスC';
      else if (parts[0] <= 239) ipClass = 'クラスD（マルチキャスト）';
      else ipClass = 'クラスE（実験用）';

      // Type
      let ipType = 'グローバル（パブリック）';
      if (parts[0] === 10) ipType = 'プライベート';
      else if (parts[0] === 172 && parts[1] >= 16 && parts[1] <= 31) ipType = 'プライベート';
      else if (parts[0] === 192 && parts[1] === 168) ipType = 'プライベート';
      else if (parts[0] === 127) ipType = 'ループバック';

      // Binary
      const binary = parts.map(p => p.toString(2).padStart(8, '0')).join('.');
      // Hex
      const hex = parts.map(p => p.toString(16).padStart(2, '0').toUpperCase()).join('.');
      // Decimal
      const decimal = ((parts[0] << 24) + (parts[1] << 16) + (parts[2] << 8) + parts[3]) >>> 0;

      document.getElementById('ip-version').textContent = 'IPv4';
      document.getElementById('ip-class').textContent = ipClass;
      document.getElementById('ip-type').textContent = ipType;
      document.getElementById('ip-binary').textContent = binary;
      document.getElementById('ip-hex').textContent = hex;
      document.getElementById('ip-decimal').textContent = decimal.toLocaleString();
    }

    function analyzeIPv6(ip) {
      document.getElementById('ip-version').textContent = 'IPv6';
      document.getElementById('ip-class').textContent = '該当なし';
      document.getElementById('ip-type').textContent = ip.startsWith('fe80') ? 'リンクローカル' : 'グローバル';
      document.getElementById('ip-binary').textContent = '(IPv6)';
      document.getElementById('ip-hex').textContent = ip;
      document.getElementById('ip-decimal').textContent = '-';
    }

    function fetchIP() {
      document.getElementById('ip-address').textContent = '取得中...';
      fetch('https://api.ipify.org?format=json')
        .then(r => r.json())
        .then(data => {
          const ip = data.ip;
          document.getElementById('ip-address').textContent = ip;
          if (ip.includes(':')) {
            analyzeIPv6(ip);
          } else {
            analyzeIPv4(ip);
          }
        })
        .catch(() => {
          document.getElementById('ip-address').textContent = '取得に失敗しました';
        });
    }

    function copyIP() {
      const ip = document.getElementById('ip-address').textContent;
      if (ip === '取得中...' || ip === '取得に失敗しました') return;
      navigator.clipboard.writeText(ip).then(() => {
        const btn = event.target;
        const orig = btn.textContent;
        btn.textContent = 'コピーしました！';
        setTimeout(() => btn.textContent = orig, 1500);
      });
    }

    fetchIP();
  </script>
