    { name: "徳島県", capital: "徳島市", region: "四国", specialties: ["すだち","鳴門金時"], silhouette: "M5,20 L30,5 55,10 80,5 95,20 90,40 65,45 40,40 15,45 5,35Z" },
    { name: "香川県", capital: "高松市", region: "四国", specialties: ["讃岐うどん","オリーブ"], silhouette: "M10,15 L35,5 60,10 80,15 85,30 70,40 45,35 20,40 5,30Z" },
    { name: "愛媛県", capital: "松山市", region: "四国", specialties: ["みかん","鯛めし"], silhouette: "M15,15 L40,5 60,10 80,25 85,45 70,55 45,50 55,70 35,75 15,60 5,40 10,25Z" },
    { name: "高知県", capital: "高知市", region: "四国", specialties: ["カツオ","ゆず"], silhouette: "M5,15 L25,5 50,10 75,5 100,15 105,30 90,40 65,35 40,40 15,35 5,25Z" },
    { name: "福岡県", capital: "福岡市", region: "九州", specialties: ["明太子","ラーメン"], silhouette: "M15,20 L35,5 60,10 80,5 95,20 90,40 70,50 45,55 20,45 5,35Z" },
    { name: "佐賀県", capital: "佐賀市", region: "九州", specialties: ["呼子イカ","佐賀牛"], silhouette: "M10,15 L35,5 60,10 80,20 85,35 65,45 40,40 15,40 5,30Z" },
    { name: "長崎県", capital: "長崎市", region: "九州", specialties: ["カステラ","ちゃんぽん"], silhouette: "M25,5 L40,15 55,10 50,30 60,45 50,55 35,65 45,80 30,85 20,70 10,50 15,30Z" },
    { name: "熊本県", capital: "熊本市", region: "九州", specialties: ["馬刺し","辛子蓮根"], silhouette: "M15,10 L40,5 65,10 85,20 90,40 80,60 60,65 75,80 55,85 35,75 20,60 10,40 10,25Z" },
    { name: "大分県", capital: "大分市", region: "九州", specialties: ["とり天","かぼす"], silhouette: "M10,20 L35,5 60,10 85,20 95,35 80,50 55,55 30,50 10,40Z" },
    { name: "宮崎県", capital: "宮崎市", region: "九州", specialties: ["チキン南蛮","マンゴー"], silhouette: "M25,5 L50,10 65,5 75,20 80,40 75,60 70,80 60,95 45,90 35,70 25,50 20,30Z" },
    { name: "鹿児島県", capital: "鹿児島市", region: "九州", specialties: ["黒豚","さつまあげ"], silhouette: "M20,5 L45,10 65,5 80,20 75,40 65,55 55,70 70,85 50,95 35,80 20,60 10,40 15,20Z" },
    { name: "沖縄県", capital: "那覇市", region: "九州", specialties: ["ソーキそば","紅芋タルト"], silhouette: "M20,10 L40,5 55,15 70,10 85,20 80,35 90,50 75,60 60,55 45,65 30,55 15,40 10,25Z" }
  ];

  // ===== Quiz State =====
  var currentMode = '';
  var questions = [];
  var currentQuestion = 0;
  var score = 0;
  var timer = null;
  var timeLeft = 15;
  var answered = false;
  var reviewData = [];

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function startQuiz(mode) {
    currentMode = mode;
    currentQuestion = 0;
    score = 0;
    reviewData = [];
    questions = shuffle(prefectures).slice(0, 10);
    document.getElementById('mode-select').style.display = 'none';
    document.getElementById('result-area').classList.remove('active');
    document.getElementById('quiz-area').classList.add('active');
    showQuestion();
  }

  function generateChoices(correctAnswer, allAnswers) {
    var wrong = shuffle(allAnswers.filter(function(a) { return a !== correctAnswer; })).slice(0, 3);
    var choices = shuffle([correctAnswer].concat(wrong));
    return choices;
  }

  function showQuestion() {
    answered = false;
    var q = questions[currentQuestion];
    var questionText = '';
    var correctAnswer = '';
    var allAnswers = [];
    var showSilhouette = false;

    if (currentMode === 'capital') {
      questionText = '「' + q.name + '」の県庁所在地は？';
      correctAnswer = q.capital;
      allAnswers = prefectures.map(function(p) { return p.capital; });
      // Remove duplicates
      allAnswers = allAnswers.filter(function(v, i, a) { return a.indexOf(v) === i; });
    } else if (currentMode === 'silhouette') {
      questionText = 'この都道府県はどこ？';
      correctAnswer = q.name;
      allAnswers = prefectures.map(function(p) { return p.name; });
      showSilhouette = true;
    } else if (currentMode === 'specialty') {
      var spec = q.specialties[Math.floor(Math.random() * q.specialties.length)];
      questionText = '「' + spec + '」が有名な都道府県は？';
      correctAnswer = q.name;
      allAnswers = prefectures.map(function(p) { return p.name; });
    }

    document.getElementById('quiz-progress').textContent = (currentQuestion + 1) + ' / 10';
    document.getElementById('quiz-score').textContent = '正解: ' + score;
    document.getElementById('question-text').textContent = questionText;

    var silContainer = document.getElementById('silhouette-container');
    if (showSilhouette) {
      silContainer.style.display = 'block';
      silContainer.innerHTML = '<svg viewBox="0 0 120 110" xmlns="http://www.w3.org/2000/svg"><path d="' + q.silhouette + '"/></svg>';
    } else {
      silContainer.style.display = 'none';
    }

    var choices = generateChoices(correctAnswer, allAnswers);
    var choicesEl = document.getElementById('choices');
    choicesEl.innerHTML = '';
    choices.forEach(function(c) {
      var btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = c;
      btn.onclick = function() { selectAnswer(c, correctAnswer); };
      choicesEl.appendChild(btn);
    });

    startTimer();
  }

  function startTimer() {
    timeLeft = 15;
    var timerEl = document.getElementById('quiz-timer');
    timerEl.textContent = timeLeft;
    timerEl.classList.remove('warning');
    clearInterval(timer);
    timer = setInterval(function() {
      timeLeft--;
      timerEl.textContent = timeLeft;
      if (timeLeft <= 5) timerEl.classList.add('warning');
      if (timeLeft <= 0) {
        clearInterval(timer);
        timeUp();
      }
    }, 1000);
  }

  function timeUp() {
    if (answered) return;
    answered = true;
    var q = questions[currentQuestion];
    var correctAnswer = '';
    if (currentMode === 'capital') correctAnswer = q.capital;
    else correctAnswer = q.name;

    var btns = document.querySelectorAll('.choice-btn');
    btns.forEach(function(btn) {
      btn.classList.add('disabled');
      if (btn.textContent === correctAnswer) btn.classList.add('show-correct');
    });

    reviewData.push({ question: document.getElementById('question-text').textContent, correct: false, answer: '時間切れ', correctAnswer: correctAnswer });

    setTimeout(nextQuestion, 1500);
  }

  function selectAnswer(selected, correct) {
    if (answered) return;
    answered = true;
    clearInterval(timer);

    var isCorrect = selected === correct;
    if (isCorrect) score++;

    var btns = document.querySelectorAll('.choice-btn');
    btns.forEach(function(btn) {
      btn.classList.add('disabled');
      if (btn.textContent === correct) btn.classList.add('correct');
      if (btn.textContent === selected && !isCorrect) btn.classList.add('incorrect');
    });

    reviewData.push({ question: document.getElementById('question-text').textContent, correct: isCorrect, answer: selected, correctAnswer: correct });

    setTimeout(nextQuestion, 1200);
  }

  function nextQuestion() {
    currentQuestion++;
    if (currentQuestion >= 10) {
      showResult();
    } else {
      showQuestion();
    }
  }

  function showResult() {
    clearInterval(timer);
    document.getElementById('quiz-area').classList.remove('active');
    document.getElementById('result-area').classList.add('active');
    document.getElementById('result-score').textContent = score;

    var msgEl = document.getElementById('result-message');
    if (score === 10) {
      msgEl.textContent = '満点！日本地理マスター！';
      msgEl.className = 'result-message result-excellent';
    } else if (score >= 7) {
      msgEl.textContent = 'すごい！かなり詳しいですね！';
      msgEl.className = 'result-message result-good';
    } else if (score >= 4) {
      msgEl.textContent = 'まずまず！もう少し頑張ろう！';
      msgEl.className = 'result-message result-ok';
    } else {
      msgEl.textContent = 'もっと勉強して再挑戦！';
      msgEl.className = 'result-message result-poor';
    }

    var modeLabel = currentMode === 'capital' ? '県庁所在地' : currentMode === 'silhouette' ? 'シルエット' : '特産品';
    var shareText = '都道府県クイズ（' + modeLabel + '）で' + score + '/10問正解しました！🗾\n#都道府県クイズ #SimpleToolkit';
    var shareUrl = 'https://simpletoolkit.net/tools/prefecture-quiz/';

    document.getElementById('share-x').href = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(shareText) + '&url=' + encodeURIComponent(shareUrl);
    document.getElementById('share-line').href = 'https://social-plugins.line.me/lineit/share?url=' + encodeURIComponent(shareUrl) + '&text=' + encodeURIComponent(shareText);

    // Answer review
    var reviewHtml = '<h3>回答の振り返り</h3>';
    reviewData.forEach(function(r, i) {
      reviewHtml += '<div class="review-item">';
      reviewHtml += '<span class="review-icon">' + (r.correct ? '⭕' : '❌') + '</span>';
      reviewHtml += '<span class="review-q">Q' + (i + 1) + '. ' + r.question + '</span>';
      if (!r.correct) {
        reviewHtml += '<span class="review-a">正解: ' + r.correctAnswer + '</span>';
      }
      reviewHtml += '</div>';
    });
    document.getElementById('answer-review').innerHTML = reviewHtml;
  }

  function copyResult() {
    var modeLabel = currentMode === 'capital' ? '県庁所在地' : currentMode === 'silhouette' ? 'シルエット' : '特産品';
    var text = '都道府県クイズ（' + modeLabel + '）で' + score + '/10問正解しました！\nhttps://simpletoolkit.net/tools/prefecture-quiz/';
    navigator.clipboard.writeText(text).then(function() {
      alert('コピーしました！');
    });
  }

  function backToModeSelect() {
    clearInterval(timer);
    document.getElementById('quiz-area').classList.remove('active');
    document.getElementById('result-area').classList.remove('active');
    document.getElementById('mode-select').style.display = 'grid';
  }

  function retryQuiz() {
    startQuiz(currentMode);
  }
  </script>
