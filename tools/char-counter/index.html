<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文字数カウント - 無料オンライン文字数チェッカー | Web便利ツール集</title>
  <meta name="description" content="文字数カウント無料ツール。入力するだけでリアルタイムに文字数・単語数・行数・バイト数を表示。Twitter・ブログ・レポートの文字数チェックに最適。登録不要でブラウザだけで完結。">
  <meta property="og:title" content="文字数カウント - 無料オンライン文字数チェッカー | Web便利ツール集">
  <meta property="og:description" content="文字数カウント無料ツール。入力するだけでリアルタイムに文字数・単語数・行数・バイト数を表示。登録不要。">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://simpletoolkit.net/tools/char-counter/">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "文字数カウント - 無料オンライン文字数チェッカー",
    "description": "文字数カウント無料ツール。入力するだけでリアルタイムに文字数・単語数・行数・バイト数を表示。登録不要でブラウザだけで完結。",
    "url": "https://simpletoolkit.net/tools/char-counter/",
    "applicationCategory": "UtilityApplication",
    "operatingSystem": "All",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "JPY" }
  }
  </script>
  <link rel="stylesheet" href="../../common/style.css">
</head>
<body>
  <script src="../../common/header.js"></script>
  <main>
    <h1>文字数カウンター</h1>
    <h2>無料オンライン文字数チェッカー</h2>
    <p class="tool-description">テキストを入力するだけで、文字数・単語数・行数・バイト数をリアルタイムでカウント。Twitter投稿やブログ記事、レポートの文字数確認に最適です。無料・登録不要・ブラウザだけで完結します。</p>

    <div class="tool-area">
      <label for="input-text">テキストを入力</label>
      <textarea id="input-text" placeholder="ここにテキストを入力してください..." rows="8"></textarea>

      <div class="stats" id="stats">
        <div class="stat-item">
          <div class="stat-value" id="char-count">0</div>
          <div class="stat-label">文字数</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="char-no-space">0</div>
          <div class="stat-label">文字数（空白なし）</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="word-count">0</div>
          <div class="stat-label">単語数</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="line-count">0</div>
          <div class="stat-label">行数</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="byte-count">0</div>
          <div class="stat-label">バイト数</div>
        </div>
      </div>

      <div class="btn-group">
        <button class="btn btn-secondary" onclick="document.getElementById('input-text').value=''; updateCount();">クリア</button>
      </div>
    </div>
  </main>
  <script src="../../common/footer.js"></script>
  <script>
    const input = document.getElementById('input-text');

    function updateCount() {
      const text = input.value;
      document.getElementById('char-count').textContent = text.length;
      document.getElementById('char-no-space').textContent = text.replace(/\s/g, '').length;
      document.getElementById('word-count').textContent = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
      document.getElementById('line-count').textContent = text === '' ? 0 : text.split('\n').length;
      document.getElementById('byte-count').textContent = new Blob([text]).size;
    }

    input.addEventListener('input', updateCount);
  </script>
</body>
</html>
