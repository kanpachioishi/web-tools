<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON整形・フォーマット - 無料オンラインJSONビューア | Web便利ツール集</title>
  <meta name="description" content="JSON整形・フォーマット無料ツール。貼り付けるだけでJSONを見やすく整形（Pretty Print）・圧縮（Minify）。API開発やデバッグに最適。登録不要でブラウザだけで完結。">
  <meta property="og:title" content="JSON整形・フォーマット - 無料オンラインJSONビューア | Web便利ツール集">
  <meta property="og:description" content="JSON整形・フォーマット無料ツール。貼り付けるだけでJSONを見やすく整形・圧縮。登録不要。">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://simpletoolkit.net/tools/json-formatter/">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "JSON整形・フォーマット - 無料オンラインJSONビューア",
    "description": "JSON整形・フォーマット無料ツール。貼り付けるだけでJSONを見やすく整形・圧縮。API開発やデバッグに最適。登録不要でブラウザだけで完結。",
    "url": "https://simpletoolkit.net/tools/json-formatter/",
    "applicationCategory": "UtilityApplication",
    "operatingSystem": "All",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "JPY" }
  }
  </script>
  <link rel="stylesheet" href="../../common/style.css">
</head>
<body>
  <script src="../../common/header.js"></script>
  <main>
    <h1>JSON整形ツール</h1>
    <h2>無料オンラインJSON整形・圧縮ツール</h2>
    <p class="tool-description">JSONデータを貼り付けるだけで見やすく整形（Pretty Print）または圧縮（Minify）。API開発・デバッグ・データ確認に便利です。無料・登録不要・ブラウザだけで完結します。</p>

    <div class="tool-area">
      <label for="json-input">JSONを入力</label>
      <textarea id="json-input" placeholder='{"name":"太郎","age":25}' rows="8" style="font-family:'SF Mono','Fira Code',monospace;font-size:0.9rem;"></textarea>

      <div class="btn-group">
        <button class="btn" onclick="formatJSON()">整形する</button>
        <button class="btn btn-secondary" onclick="minifyJSON()">圧縮する</button>
        <button class="btn btn-secondary" onclick="copyResult()">コピー</button>
      </div>

      <div id="error-msg" style="color:#dc2626;margin-top:12px;display:none;"></div>

      <div class="result-area" id="result" style="display:none;">
        <pre id="json-output"></pre>
      </div>
    </div>
  </main>
  <script src="../../common/footer.js"></script>
  <script>
    function parseInput() {
      const input = document.getElementById('json-input').value.trim();
      const errorEl = document.getElementById('error-msg');
      errorEl.style.display = 'none';
      if (!input) return null;
      try {
        return JSON.parse(input);
      } catch (e) {
        errorEl.textContent = 'JSONの形式が正しくありません: ' + e.message;
        errorEl.style.display = 'block';
        document.getElementById('result').style.display = 'none';
        return null;
      }
    }

    function showResult(text) {
      document.getElementById('json-output').textContent = text;
      document.getElementById('result').style.display = 'block';
    }

    function formatJSON() {
      const obj = parseInput();
      if (obj !== null) showResult(JSON.stringify(obj, null, 2));
    }

    function minifyJSON() {
      const obj = parseInput();
      if (obj !== null) showResult(JSON.stringify(obj));
    }

    function copyResult() {
      const text = document.getElementById('json-output').textContent;
      if (text) navigator.clipboard.writeText(text);
    }
  </script>
</body>
</html>
