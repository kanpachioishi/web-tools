  <script>
    const KANJI_DIGITS = ['〇','一','二','三','四','五','六','七','八','九'];
    const DAIJI_DIGITS = ['零','壱','弐','参','肆','伍','陸','漆','捌','玖'];
    const UNITS = ['', '万', '億', '兆', '京'];
    const SMALL_UNITS = ['', '十', '百', '千'];
    const DAIJI_UNITS = ['', '拾', '佰', '仟'];
    const DAIJI_BIG_UNITS = ['', '萬', '億', '兆', '京'];

    function numberToKanji(num, useDaiji) {
      if (num === 0) return useDaiji ? '零' : '〇';
      const digits = useDaiji ? DAIJI_DIGITS : KANJI_DIGITS;
      const smallUnits = useDaiji ? DAIJI_UNITS : SMALL_UNITS;
      const bigUnits = useDaiji ? DAIJI_BIG_UNITS : UNITS;
      let str = String(num);
      let isNegative = false;
      if (str.startsWith('-')) { isNegative = true; str = str.slice(1); }

      // Split into groups of 4 from right
      const groups = [];
      while (str.length > 0) {
        groups.unshift(str.slice(-4));
        str = str.slice(0, -4);
      }

      let result = '';
      for (let i = 0; i < groups.length; i++) {
        const groupIndex = groups.length - 1 - i;
        const g = parseInt(groups[i], 10);
        if (g === 0) continue;
        const gStr = String(g).padStart(4, '0');
        let groupResult = '';
        for (let j = 0; j < 4; j++) {
          const d = parseInt(gStr[j], 10);
          const unitIndex = 3 - j;
          if (d === 0) continue;
          if (d === 1 && unitIndex > 0) {
            groupResult += smallUnits[unitIndex];
          } else {
            groupResult += digits[d] + smallUnits[unitIndex];
          }
        }
        result += groupResult + bigUnits[groupIndex];
      }
      return (isNegative ? 'マイナス' : '') + result;
    }

    function kanjiToNumber(kanjiStr) {
      if (!kanjiStr) return NaN;
      let s = kanjiStr.trim();
      let negative = false;
      if (s.startsWith('マイナス')) { negative = true; s = s.slice(4); }

      // Map all kanji digits and daiji to numbers
      const digitMap = {'〇':0,'零':0,'一':1,'壱':1,'二':2,'弐':2,'三':3,'参':3,'四':4,'肆':4,'五':5,'伍':5,'六':6,'陸':6,'七':7,'漆':7,'八':8,'捌':8,'九':9,'玖':9};
      const smallUnitMap = {'十':10,'拾':10,'百':100,'佰':100,'千':1000,'仟':1000};
      const bigUnitMap = {'万':10000,'萬':10000,'億':100000000,'兆':1000000000000,'京':10000000000000000};

      // Simple digit-only string (e.g. 一二三)
      const allDigits = [...s].every(c => c in digitMap);
      if (allDigits && s.length > 0) {
        return (negative ? -1 : 1) * parseInt([...s].map(c => digitMap[c]).join(''), 10);
      }

      let total = 0;
      let currentGroup = 0;
      let currentNum = 0;

      for (const ch of s) {
        if (ch in digitMap) {
          currentNum = digitMap[ch];
        } else if (ch in smallUnitMap) {
          if (currentNum === 0) currentNum = 1;
          currentGroup += currentNum * smallUnitMap[ch];
          currentNum = 0;
        } else if (ch in bigUnitMap) {
          currentGroup += currentNum;
          if (currentGroup === 0) currentGroup = 1;
          total += currentGroup * bigUnitMap[ch];
          currentGroup = 0;
          currentNum = 0;
        }
      }
      total += currentGroup + currentNum;
      return (negative ? -1 : 1) * total;
    }

    document.getElementById('number-input').addEventListener('input', function() {
      const val = this.value.replace(/[,\s]/g, '');
      if (val === '' || isNaN(Number(val))) {
        document.getElementById('kanji-normal').textContent = val === '' ? '-' : '有効な数字を入力してください';
        document.getElementById('kanji-daiji').textContent = val === '' ? '-' : '有効な数字を入力してください';
        return;
      }
      const num = parseInt(val, 10);
      document.getElementById('kanji-normal').textContent = numberToKanji(num, false);
      document.getElementById('kanji-daiji').textContent = numberToKanji(num, true);
    });

    document.getElementById('kanji-input').addEventListener('input', function() {
      const val = this.value.trim();
      if (val === '') {
        document.getElementById('number-result').textContent = '-';
        return;
      }
      const num = kanjiToNumber(val);
      document.getElementById('number-result').textContent = isNaN(num) ? '変換できません' : num.toLocaleString();
    });
  </script>
