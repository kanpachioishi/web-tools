  <script>
    var currentTone = 'gal';

    function selectTone(el) {
      var buttons = document.querySelectorAll('.tone-btn');
      for (var i = 0; i < buttons.length; i++) {
        buttons[i].classList.remove('active');
      }
      el.classList.add('active');
      currentTone = el.getAttribute('data-tone');
      // Auto-convert if there's already text and a result is showing
      if (document.getElementById('result-area').classList.contains('show') && document.getElementById('input-text').value.trim()) {
        convertTone();
      }
    }

    function insertExample() {
      document.getElementById('input-text').value = '今日はすごいいい天気ですね。本当に嬉しいです。明日も天気がいいといいですね。私はあなたと一緒に出かけたいです。ご飯を食べるのが楽しみです。それは本当にすごいことだと思います。';
      updateCharCount();
    }

    function updateCharCount() {
      var text = document.getElementById('input-text').value;
      document.getElementById('char-count').textContent = text.length;
    }

    document.getElementById('input-text').addEventListener('input', updateCharCount);

    var toneNames = {
      gal: 'ギャル語',
      samurai: '武士語',
      kansai: '関西弁',
      cat: '猫語',
      casual: 'タメ口',
      polite: '敬語'
    };

    function convertTone() {
      var text = document.getElementById('input-text').value.trim();
      if (!text) {
        alert('文章を入力してください。');
        return;
      }

      var result = '';
      switch (currentTone) {
        case 'gal':
          result = toGal(text);
          break;
        case 'samurai':
          result = toSamurai(text);
          break;
        case 'kansai':
          result = toKansai(text);
          break;
        case 'cat':
          result = toCat(text);
          break;
        case 'casual':
          result = toCasual(text);
          break;
        case 'polite':
          result = toPolite(text);
          break;
      }

      document.getElementById('result-label').textContent = toneNames[currentTone] + 'に変換';
      document.getElementById('result-box').textContent = result;
      document.getElementById('result-area').classList.add('show');

      // Update share links
      var shareText = '【口調変換ツール】' + toneNames[currentTone] + 'に変換してみた！\n\n' + result.substring(0, 100) + (result.length > 100 ? '...' : '');
      var shareUrl = 'https://simpletoolkit.net/tools/tone-converter/';
      document.getElementById('share-x').href = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(shareText) + '&url=' + encodeURIComponent(shareUrl);
      document.getElementById('share-line').href = 'https://social-plugins.line.me/lineit/share?url=' + encodeURIComponent(shareUrl) + '&text=' + encodeURIComponent(shareText);
    }

    // --- Conversion functions ---

    function toGal(text) {
      var t = text;
      // Longer patterns first
      t = t.replace(/すごい/g, 'まぢヤバい');
      t = t.replace(/すごく/g, 'まぢヤバく');
      t = t.replace(/本当に/g, 'マヂで');
      t = t.replace(/本当/g, 'マヂ');
      t = t.replace(/とても/g, 'めっちゃ');
      t = t.replace(/ありがとう/g, 'あざーす');
      t = t.replace(/おはよう/g, 'おはよ～');
      t = t.replace(/こんにちは/g, 'やっほー');
      t = t.replace(/かわいい/g, 'かわゆす');
      t = t.replace(/うれしい/g, 'うれぴー');
      t = t.replace(/嬉しい/g, 'うれぴー');
      t = t.replace(/楽しい/g, 'たのぴー');
      t = t.replace(/楽しみ/g, 'たのしみぃ');
      t = t.replace(/ました/g, 'たょ');
      t = t.replace(/ません/g, 'なぃょ');
      t = t.replace(/ですね/g, 'だょね');
      t = t.replace(/ですか/g, 'なの？');
      t = t.replace(/ですよ/g, 'だょ');
      t = t.replace(/です/g, 'だょ');
      t = t.replace(/ますね/g, 'まぁすね');
      t = t.replace(/ますか/g, 'まぁすか');
      t = t.replace(/ます/g, 'まぁす');
      t = t.replace(/ない/g, 'なぃ');
      t = t.replace(/思います/g, '思うょ');
      t = t.replace(/思う/g, '思うょ');
      // Add endings
      var suffixes = ['☆', '♡', '～♪', 'っ！', 'ぉ☆'];
      t = t.replace(/。/g, function() {
        return suffixes[Math.floor(Math.random() * suffixes.length)];
      });
      return t;
    }

    function toSamurai(text) {
      var t = text;
      t = t.replace(/私は/g, '拙者は');
      t = t.replace(/私の/g, '拙者の');
      t = t.replace(/私が/g, '拙者が');
      t = t.replace(/私も/g, '拙者も');
      t = t.replace(/あなた/g, 'そなた');
      t = t.replace(/食べる/g, '食す');
      t = t.replace(/食べた/g, '食した');
      t = t.replace(/食べて/g, '食して');
      t = t.replace(/食べたい/g, '食したい');
      t = t.replace(/すごい/g, '誠に見事な');
      t = t.replace(/すごく/g, '誠に');
      t = t.replace(/本当に/g, '真に');
      t = t.replace(/本当/g, '真');
      t = t.replace(/ありがとう/g, 'かたじけない');
      t = t.replace(/すみません/g, '申し訳ござらぬ');
      t = t.replace(/ごめん/g, '許されよ');
      t = t.replace(/嬉しい/g, '喜ばしい');
      t = t.replace(/楽しい/g, '愉快である');
      t = t.replace(/楽しみ/g, '心待ちにしておる');
      t = t.replace(/出かけたい/g, '出陣したい');
      t = t.replace(/ました/g, 'たでござる');
      t = t.replace(/ません/g, 'ぬでござる');
      t = t.replace(/ですね/g, 'でござるな');
      t = t.replace(/ですか/g, 'でござるか');
      t = t.replace(/ですよ/g, 'でござるよ');
      t = t.replace(/です/g, 'でござる');
      t = t.replace(/ますね/g, 'まするな');
      t = t.replace(/ますか/g, 'まするか');
      t = t.replace(/ます/g, 'まする');
      t = t.replace(/ない/g, 'ござらぬ');
      t = t.replace(/だと思う/g, 'であろう');
      t = t.replace(/思います/g, '思うでござる');
      t = t.replace(/思う/g, '思うでござる');
      return t;
    }

    function toKansai(text) {
      var t = text;
      t = t.replace(/すごい/g, 'めっちゃ');
      t = t.replace(/すごく/g, 'めっちゃ');
      t = t.replace(/本当に/g, 'ほんまに');
      t = t.replace(/本当/g, 'ほんま');
      t = t.replace(/とても/g, 'めっちゃ');
      t = t.replace(/ありがとう/g, 'おおきに');
      t = t.replace(/だから/g, 'やから');
      t = t.replace(/だけど/g, 'やけど');
      t = t.replace(/だって/g, 'やって');
      t = t.replace(/嬉しい/g, 'うれしいわぁ');
      t = t.replace(/楽しい/g, 'おもろい');
      t = t.replace(/楽しみ/g, '楽しみやわ');
      t = t.replace(/ました/g, 'ましたで');
      t = t.replace(/ません/g, 'まへん');
      t = t.replace(/ですね/g, 'やね');
      t = t.replace(/ですか/g, 'でっか');
      t = t.replace(/ですよ/g, 'やで');
      t = t.replace(/です/g, 'やで');
      t = t.replace(/ますね/g, 'まっせな');
      t = t.replace(/ますか/g, 'まっか');
      t = t.replace(/ます/g, 'まっせ');
      t = t.replace(/ない/g, 'あらへん');
      t = t.replace(/だと思う/g, 'やと思うわ');
      t = t.replace(/思います/g, '思うで');
      t = t.replace(/思う/g, '思うわ');
      t = t.replace(/いいね/g, 'ええやん');
      t = t.replace(/いい/g, 'ええ');
      return t;
    }

    function toCat(text) {
      var t = text;
      // Replace な with にゃ (but not inside certain words)
      t = t.replace(/な/g, 'にゃ');
      // Fix common broken words from な→にゃ replacement
      t = t.replace(/にゃい/g, 'ないにゃ');
      // Add cat endings to sentences
      var catEndings = ['にゃん', 'にゃ～', 'にゃ！', 'にゃんにゃん'];
      t = t.replace(/。/g, function() {
        return catEndings[Math.floor(Math.random() * catEndings.length)];
      });
      t = t.replace(/！/g, 'にゃ！');
      t = t.replace(/？/g, 'にゃ？');
      return t;
    }

    function toCasual(text) {
      var t = text;
      t = t.replace(/いたします/g, 'するよ');
      t = t.replace(/いただけますでしょうか/g, 'くれない？');
      t = t.replace(/いただけますか/g, 'くれる？');
      t = t.replace(/いただきます/g, 'もらうね');
      t = t.replace(/でしょうか/g, 'かな？');
      t = t.replace(/でしょう/g, 'でしょ');
      t = t.replace(/ございます/g, 'あるよ');
      t = t.replace(/ください/g, 'して');
      t = t.replace(/ました/g, 'したよ');
      t = t.replace(/ません/g, 'ないよ');
      t = t.replace(/ですね/g, 'だね');
      t = t.replace(/ですか/g, 'なの？');
      t = t.replace(/ですよ/g, 'だよ');
      t = t.replace(/です/g, 'だよ');
      t = t.replace(/ますね/g, 'るね');
      t = t.replace(/ますか/g, 'る？');
      t = t.replace(/ます/g, 'るよ');
      t = t.replace(/申し上げ/g, '言う');
      t = t.replace(/存じ/g, '知って');
      t = t.replace(/おっしゃ/g, '言');
      return t;
    }

    function toPolite(text) {
      var t = text;
      t = t.replace(/じゃん/g, 'ですよね');
      t = t.replace(/だよね/g, 'ですよね');
      t = t.replace(/だよな/g, 'ですよね');
      t = t.replace(/だよ/g, 'です');
      t = t.replace(/だね/g, 'ですね');
      t = t.replace(/だな/g, 'ですね');
      t = t.replace(/だぜ/g, 'ですよ');
      t = t.replace(/だろ/g, 'でしょう');
      t = t.replace(/するよ/g, 'します');
      t = t.replace(/するね/g, 'しますね');
      t = t.replace(/してよ/g, 'してください');
      t = t.replace(/して！/g, 'してください！');
      t = t.replace(/しろよ/g, 'してください');
      t = t.replace(/くれる？/g, 'いただけますか？');
      t = t.replace(/くれない？/g, 'いただけますか？');
      t = t.replace(/やばい/g, '素晴らしい');
      t = t.replace(/ヤバい/g, '素晴らしい');
      t = t.replace(/マジ/g, '本当に');
      t = t.replace(/まじ/g, '本当に');
      t = t.replace(/めっちゃ/g, 'とても');
      t = t.replace(/超/g, 'とても');
      t = t.replace(/うまい/g, '美味しい');
      t = t.replace(/すげー/g, 'すごい');
      t = t.replace(/すげぇ/g, 'すごい');
      return t;
    }

    function copyResult() {
      var resultText = document.getElementById('result-box').textContent;
      navigator.clipboard.writeText(resultText).then(function() {
        var btn = document.getElementById('copy-btn');
        btn.classList.add('copied');
        btn.innerHTML = '&#x2705; コピーしました';
        setTimeout(function() {
          btn.classList.remove('copied');
          btn.innerHTML = '&#x1F4CB; コピー';
        }, 2000);
      });
    }

    function clearAll() {
      document.getElementById('input-text').value = '';
      document.getElementById('result-area').classList.remove('show');
      updateCharCount();
    }

    // Enter key support (Ctrl+Enter to convert)
    document.getElementById('input-text').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        convertTone();
      }
    });
  </script>
</body>
</html>
