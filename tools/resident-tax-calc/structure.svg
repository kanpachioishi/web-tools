<svg viewBox="0 0 600 180" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
        <!-- 住民税ボックス -->
        <rect x="10" y="10" width="580" height="160" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
        <text x="300" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#1e40af">住民税</text>
        <!-- 所得割 -->
        <rect x="30" y="55" width="340" height="100" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
        <text x="200" y="82" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">所得割（課税所得 × 10%）</text>
        <text x="110" y="110" text-anchor="middle" font-size="12" fill="#3b82f6">都道府県民税</text>
        <text x="110" y="128" text-anchor="middle" font-size="16" font-weight="700" fill="#1d4ed8">4%</text>
        <line x1="200" y1="95" x2="200" y2="145" stroke="#93c5fd" stroke-width="1" stroke-dasharray="4"/>
        <text x="290" y="110" text-anchor="middle" font-size="12" fill="#3b82f6">市区町村民税</text>
        <text x="290" y="128" text-anchor="middle" font-size="16" font-weight="700" fill="#1d4ed8">6%</text>
        <text x="200" y="148" text-anchor="middle" font-size="11" fill="#6b7280">※住民税の大部分を占める</text>
        <!-- 均等割 -->
        <rect x="390" y="55" width="180" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
        <text x="480" y="82" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">均等割（定額）</text>
        <text x="480" y="110" text-anchor="middle" font-size="12" fill="#b45309">都道府県 1,500円</text>
        <text x="480" y="130" text-anchor="middle" font-size="12" fill="#b45309">市区町村 3,500円</text>
        <text x="480" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">= 年5,000円</text>
        <!-- プラス記号 -->
        <text x="375" y="112" text-anchor="middle" font-size="24" font-weight="700" fill="#6b7280">+</text>
      </svg>
