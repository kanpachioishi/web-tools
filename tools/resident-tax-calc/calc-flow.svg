<svg viewBox="0 0 600 420" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
        <!-- Step 1: 年収 -->
        <rect x="150" y="10" width="300" height="50" rx="8" fill="#2563eb" stroke="none"/>
        <text x="300" y="40" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">年収（額面給与）</text>
        <!-- 矢印1 -->
        <polygon points="300,60 290,72 295,72 295,80 305,80 305,72 310,72" fill="#94a3b8"/>
        <text x="460" y="76" text-anchor="start" font-size="11" fill="#dc2626">− 給与所得控除</text>
        <!-- Step 2: 給与所得 -->
        <rect x="150" y="82" width="300" height="50" rx="8" fill="#3b82f6" stroke="none"/>
        <text x="300" y="112" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">給与所得</text>
        <!-- 矢印2 -->
        <polygon points="300,132 290,144 295,144 295,152 305,152 305,144 310,144" fill="#94a3b8"/>
        <text x="460" y="148" text-anchor="start" font-size="11" fill="#dc2626">− 社会保険料控除</text>
        <text x="460" y="162" text-anchor="start" font-size="11" fill="#dc2626">− 基礎控除（43万円）</text>
        <text x="460" y="176" text-anchor="start" font-size="11" fill="#dc2626">− 配偶者・扶養控除</text>
        <!-- Step 3: 課税所得 -->
        <rect x="150" y="182" width="300" height="50" rx="8" fill="#60a5fa" stroke="none"/>
        <text x="300" y="212" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">課税所得</text>
        <!-- 矢印3 -->
        <polygon points="300,232 290,244 295,244 295,252 305,252 305,244 310,244" fill="#94a3b8"/>
        <text x="460" y="248" text-anchor="start" font-size="11" fill="#2563eb">× 10%（所得割税率）</text>
        <!-- Step 4: 所得割 -->
        <rect x="150" y="254" width="300" height="50" rx="8" fill="#93c5fd" stroke="none"/>
        <text x="300" y="284" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a5f">所得割額</text>
        <!-- 矢印4 -->
        <polygon points="300,304 290,316 295,316 295,324 305,324 305,316 310,316" fill="#94a3b8"/>
        <text x="460" y="320" text-anchor="start" font-size="11" fill="#f59e0b">+ 均等割（5,000円）</text>
        <text x="460" y="334" text-anchor="start" font-size="11" fill="#f59e0b">+ 超過課税（地域による）</text>
        <!-- Step 5: 住民税 -->
        <rect x="130" y="330" width="340" height="60" rx="10" fill="#16a34a" stroke="none"/>
        <text x="300" y="358" text-anchor="middle" font-size="17" font-weight="800" fill="#fff">住民税（年額）</text>
        <text x="300" y="380" text-anchor="middle" font-size="12" fill="#bbf7d0">翌年6月〜翌々年5月に支払い</text>
      </svg>
