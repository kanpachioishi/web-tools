<body>
  <script src="../../common/header.js"></script>
  <script src="../../common/breadcrumb.js"></script>
  <main>
    <h1>パスワード生成ツール</h1>
    <h2>安全なランダムパスワード自動作成</h2>
    <p class="tool-description">暗号学的に安全なランダムパスワードをワンクリックで自動生成。文字数・大文字小文字・数字・記号の有無を自由にカスタマイズできます。無料・登録不要・ブラウザだけで完結します。</p>

    <div class="tool-area">
      <div class="option-row">
        <label for="pw-length">文字数:</label>
        <input type="number" id="pw-length" value="16" min="4" max="128" style="width:80px;">
      </div>
      <div class="option-row">
        <label><input type="checkbox" id="pw-upper" checked> 大文字 (A-Z)</label>
        <label><input type="checkbox" id="pw-lower" checked> 小文字 (a-z)</label>
        <label><input type="checkbox" id="pw-digits" checked> 数字 (0-9)</label>
        <label><input type="checkbox" id="pw-symbols" checked> 記号 (!@#$...)</label>
      </div>

      <div class="btn-group">
        <button class="btn" onclick="generate()">生成する</button>
        <button class="btn btn-secondary" onclick="copyPw()">コピー</button>
      </div>

      <div class="result-area" style="margin-top:16px;">
        <pre id="pw-output" style="font-size:1.2rem;letter-spacing:1px;text-align:center;min-height:1.5em;">ここにパスワードが表示されます</pre>
      </div>

      <div id="pw-strength" style="margin-top:12px;text-align:center;font-weight:600;"></div>
    </div>
    <section style="margin-top:40px;">
      <h2 style="font-size:1.2rem;margin-bottom:12px;">関連記事</h2>

        <p>安全なパスワードの条件や作り方を徹底解説</p>

          <p>MD5・SHA-256等のハッシュ値を一括生成</p>
        </a>

          <h3 style="font-size:1rem;margin:0;">Base64エンコード・デコード</h3>
          <p>テキストをBase64に変換・逆変換</p>

        <a href="../qr-generator/" class="tool-card">
          <h3 style="font-size:1rem;margin:0;">QRコード生成ツール</h3>
          <p>URLやテキストからQRコードを生成</p>
        </a>

  <script src="../../common/footer.js"></script>
  <script>
    function generate() {
      const length = Math.min(128, Math.max(4, parseInt(document.getElementById('pw-length').value) || 16));
      let chars = '';
      if (document.getElementById('pw-upper').checked) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      if (document.getElementById('pw-lower').checked) chars += 'abcdefghijklmnopqrstuvwxyz';
      if (document.getElementById('pw-digits').checked) chars += '0123456789';
      if (document.getElementById('pw-symbols').checked) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';

      if (!chars) { chars = 'abcdefghijklmnopqrstuvwxyz'; }

      const array = new Uint32Array(length);
      crypto.getRandomValues(array);
      let password = '';
      for (let i = 0; i < length; i++) {
        password += chars[array[i] % chars.length];
      }

      document.getElementById('pw-output').textContent = password;

      // 強度表示
      const entropy = Math.log2(Math.pow(chars.length, length));
      const el = document.getElementById('pw-strength');
      if (entropy >= 128) { el.textContent = '強度: 非常に強い'; el.style.color = '#16a34a'; }
      else if (entropy >= 60) { el.textContent = '強度: 強い'; el.style.color = '#2563eb'; }
      else if (entropy >= 36) { el.textContent = '強度: 普通'; el.style.color = '#d97706'; }
      else { el.textContent = '強度: 弱い'; el.style.color = '#dc2626'; }
    }

    function copyPw() {
      const text = document.getElementById('pw-output').textContent;
      if (text && text !== 'ここにパスワードが表示されます') navigator.clipboard.writeText(text);
    }

    generate();
  </script>
