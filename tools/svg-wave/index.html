<body>

  <main>
    <h1>SVG Waveジェネレーター</h1>
    <h2>おしゃれな波背景を簡単作成</h2>
    <p class="tool-description">Webサイトの背景やセクション区切りに使えるSVG波形をインタラクティブに生成。色・高さ・周波数・レイヤー数を自由に調整し、SVGコードやCSSコードをワンクリックでコピーできます。無料・登録不要。</p>

    <div class="tool-area">
      <h3 style="font-size:1rem;margin-bottom:12px;">プリセット</h3>
      <div class="presets-grid" id="presets-grid"></div>

      <div class="controls-grid">
        <div class="control-group">
          <label>波の高さ</label>
          <div class="control-row">
            <input type="range" id="waveHeight" min="20" max="200" value="80">
            <span class="range-value" id="waveHeightVal">80</span>
          </div>
        </div>
        <div class="control-group">
          <label>波の周波数</label>
          <div class="control-row">
            <input type="range" id="waveFreq" min="1" max="8" value="3">
            <span class="range-value" id="waveFreqVal">3</span>
          </div>
        </div>
        <div class="control-group">
          <label>レイヤー数（1-3）</label>
          <div class="control-row">
            <input type="range" id="layerCount" min="1" max="3" value="2">
            <span class="range-value" id="layerCountVal">2</span>
          </div>
        </div>
        <div class="control-group">
          <label>ランダム度</label>
          <div class="control-row">
            <input type="range" id="randomness" min="0" max="100" value="30">
            <span class="range-value" id="randomnessVal">30</span>
          </div>
        </div>
        <div class="control-group">
          <label>背景色</label>
          <div class="control-row">
            <input type="color" id="bgColor" value="#ffffff">
          </div>
        </div>
        <div class="control-group">
          <label style="margin-bottom:4px;">レイヤー色</label>
          <div class="layer-colors" id="layerColors"></div>
        </div>
      </div>

      <div style="margin-bottom: 16px;">
        <label class="checkbox-label">
          <input type="checkbox" id="flipWave">
          上下反転
        </label>
      </div>

      <div class="btn-group" style="margin-bottom:20px;">
        <button class="btn" onclick="regenerate()">再生成（ランダムを変更）</button>
      </div>

      <h3 style="font-size:1rem;margin-bottom:8px;">プレビュー</h3>
      <div class="preview-area" id="previewArea"></div>

      <div class="output-section">
        <div class="tab-btns">
          <button class="tab-btn active" onclick="switchTab('svg')">SVGコード</button>
          <button class="tab-btn" onclick="switchTab('css')">CSSコード</button>
        </div>
        <div class="code-output" id="codeOutput"></div>
        <div class="output-btns">
          <button class="btn" onclick="copyCode()">コードをコピー</button>
          <button class="btn btn-secondary" onclick="downloadSVG()">SVGダウンロード</button>
        </div>
      </div>
    </div>

    <section style="margin-top:40px;">
      <h2 style="font-size:1.2rem;margin-top:24px;margin-bottom:12px;">他のツール</h2>
      <div class="tool-grid">
        <a href="../color-converter/" class="tool-card">
          <h3 style="font-size:1rem;margin:0;">カラーコード変換</h3>
          <p>HEX・RGB・HSLを相互変換</p>
        </a>
        <a href="../qr-generator/" class="tool-card">
          <h3 style="font-size:1rem;margin:0;">QRコード生成</h3>
          <p>URLやテキストからQRコードを生成</p>
        </a>
        <a href="../base64/" class="tool-card">
          <h3 style="font-size:1rem;margin:0;">Base64エンコード・デコード</h3>
          <p>テキストやファイルをBase64変換</p>
        </a>
      </div>
    </section>

  <script src="../../common/footer.js"></script>
  <div class="copy-toast" id="copyToast">コピーしました</div>
  <script>
    var currentTab = 'svg';
    var currentSVG = '';
    var seed = Math.random();

    var presets = [
      { name: '海', bg: '#0a1628', colors: ['#0077b6', '#00b4d8', '#90e0ef'], layers: 3, height: 100, freq: 3 },
      { name: '夕焼け', bg: '#1a0533', colors: ['#ff6b35', '#f7931e', '#ffd700'], layers: 3, height: 90, freq: 2 },
      { name: '森', bg: '#0b2e0b', colors: ['#2d6a4f', '#52b788', '#95d5b2'], layers: 3, height: 80, freq: 3 },
      { name: 'ネオン', bg: '#0d0221', colors: ['#ff00ff', '#00ffff', '#ff006e'], layers: 3, height: 100, freq: 4 },
      { name: '桜', bg: '#fff5f5', colors: ['#ff8fab', '#ffb3c6', '#ffc2d1'], layers: 3, height: 70, freq: 2 },
      { name: 'モノクロ', bg: '#ffffff', colors: ['#333333', '#666666', '#999999'], layers: 3, height: 80, freq: 3 },
      { name: '空', bg: '#e0f2fe', colors: ['#0ea5e9', '#38bdf8', '#7dd3fc'], layers: 3, height: 90, freq: 2 },
      { name: '炎', bg: '#1c0a00', colors: ['#dc2626', '#ea580c', '#f59e0b'], layers: 3, height: 110, freq: 4 },
      { name: 'パステル', bg: '#fefce8', colors: ['#c4b5fd', '#a5b4fc', '#93c5fd'], layers: 3, height: 70, freq: 2 },
      { name: 'ミント', bg: '#f0fdf4', colors: ['#059669', '#34d399', '#6ee7b7'], layers: 3, height: 80, freq: 3 }
    ];

    // Initialize presets
    var presetsGrid = document.getElementById('presets-grid');
    presets.forEach(function(p, i) {
      var btn = document.createElement('button');
      btn.className = 'preset-btn';
      btn.textContent = p.name;
      btn.onclick = function() { applyPreset(i); };
      presetsGrid.appendChild(btn);
    });

    function applyPreset(index) {
      var p = presets[index];
      document.getElementById('bgColor').value = p.bg;
      document.getElementById('waveHeight').value = p.height;
      document.getElementById('waveHeightVal').textContent = p.height;
      document.getElementById('waveFreq').value = p.freq;
      document.getElementById('waveFreqVal').textContent = p.freq;
      document.getElementById('layerCount').value = p.layers;
      document.getElementById('layerCountVal').textContent = p.layers;

      // Update preset button active state
      var btns = presetsGrid.querySelectorAll('.preset-btn');
      btns.forEach(function(b, bi) {
        b.className = bi === index ? 'preset-btn active' : 'preset-btn';
      });

      updateLayerColorInputs(p.colors);
      generateWave();
    }

    function updateLayerColorInputs(colors) {
      var count = parseInt(document.getElementById('layerCount').value);
      var container = document.getElementById('layerColors');
      container.innerHTML = '';
      for (var i = 0; i < count; i++) {
        var item = document.createElement('div');
        item.className = 'layer-color-item';
        var label = document.createElement('span');
        label.textContent = (i + 1) + ':';
        var input = document.createElement('input');
        input.type = 'color';
        input.id = 'layerColor' + i;
        input.value = colors && colors[i] ? colors[i] : ['#0077b6', '#00b4d8', '#90e0ef'][i] || '#0077b6';
        input.style.width = '50px';
        input.style.height = '32px';
        input.style.border = '1px solid var(--border)';
        input.style.borderRadius = 'var(--radius)';
        input.style.cursor = 'pointer';
        input.style.padding = '2px';
        input.addEventListener('input', generateWave);
        item.appendChild(label);
        item.appendChild(input);
        container.appendChild(item);
      }
    }

    function getLayerColors() {
      var count = parseInt(document.getElementById('layerCount').value);
      var colors = [];
      for (var i = 0; i < count; i++) {
        var el = document.getElementById('layerColor' + i);
        colors.push(el ? el.value : '#0077b6');
      }
      return colors;
    }

    function seededRandom(s) {
      var x = Math.sin(s * 9301 + 49297) * 233280;
      return x - Math.floor(x);
    }

    function generateWavePath(width, height, waveHeight, freq, randomness, layerIndex, svgSeed, flip) {
      var points = [];
      var segments = freq * 2;
      var segWidth = width / segments;
      var baseY = flip ? waveHeight * 0.3 : height - waveHeight * 0.3;
      var amplitude = waveHeight * 0.4 * (1 - layerIndex * 0.15);

      for (var i = 0; i <= segments; i++) {
        var x = i * segWidth;
        var normalY = Math.sin((i / segments) * Math.PI * freq) * amplitude;
        var rand = (seededRandom(svgSeed + i * 17 + layerIndex * 100) - 0.5) * randomness * 0.6;
        var y = baseY + (flip ? 1 : -1) * (normalY + rand);
        points.push({ x: x, y: y });
      }

      // Build path with cubic bezier curves
      var d = 'M0,' + (flip ? 0 : height);
      d += ' L0,' + points[0].y;

      for (var i = 0; i < points.length - 1; i++) {
        var p0 = points[i];
        var p1 = points[i + 1];
        var cpx1 = p0.x + segWidth * 0.5;
        var cpy1 = p0.y;
        var cpx2 = p1.x - segWidth * 0.5;
        var cpy2 = p1.y;
        d += ' C' + cpx1.toFixed(1) + ',' + cpy1.toFixed(1) +
             ' ' + cpx2.toFixed(1) + ',' + cpy2.toFixed(1) +
             ' ' + p1.x.toFixed(1) + ',' + p1.y.toFixed(1);
      }

      d += ' L' + width + ',' + (flip ? 0 : height);
      d += ' Z';
      return d;
    }

    function generateWave() {
      var width = 1200;
      var height = 300;
      var waveHeight = parseInt(document.getElementById('waveHeight').value);
      var freq = parseInt(document.getElementById('waveFreq').value);
      var layerCount = parseInt(document.getElementById('layerCount').value);
      var randomness = parseInt(document.getElementById('randomness').value);
      var bgColor = document.getElementById('bgColor').value;
      var flip = document.getElementById('flipWave').checked;
      var colors = getLayerColors();

      var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ' + width + ' ' + height + '" preserveAspectRatio="none">\n';
      svg += '  <rect width="' + width + '" height="' + height + '" fill="' + bgColor + '"/>\n';

      for (var i = layerCount - 1; i >= 0; i--) {
        var opacity = 1 - i * 0.2;
        var layerSeed = seed + i * 37;
        var d = generateWavePath(width, height, waveHeight + i * 15, freq, randomness, i, layerSeed, flip);
        svg += '  <path d="' + d + '" fill="' + colors[i] + '" opacity="' + opacity.toFixed(2) + '"/>\n';
      }

      svg += '</svg>';
      currentSVG = svg;

      document.getElementById('previewArea').innerHTML = svg;
      updateCodeOutput();
    }

    function updateCodeOutput() {
      var output = document.getElementById('codeOutput');
      if (currentTab === 'svg') {
        output.textContent = currentSVG;
      } else {
        var encoded = currentSVG.replace(/"/g, "'").replace(/#/g, '%23').replace(/\n/g, '').replace(/\s+/g, ' ');
        output.textContent = 'background-image: url("data:image/svg+xml,' + encoded + '");\nbackground-size: cover;\nbackground-repeat: no-repeat;\nbackground-position: bottom;';
      }
    }

    function switchTab(tab) {
      currentTab = tab;
      var btns = document.querySelectorAll('.tab-btn');
      btns.forEach(function(b) {
        b.className = b.textContent.toLowerCase().indexOf(tab) >= 0 ? 'tab-btn active' : 'tab-btn';
      });
      // Fix tab matching
      btns[0].className = tab === 'svg' ? 'tab-btn active' : 'tab-btn';
      btns[1].className = tab === 'css' ? 'tab-btn active' : 'tab-btn';
      updateCodeOutput();
    }

    function copyCode() {
      var text = document.getElementById('codeOutput').textContent;
      navigator.clipboard.writeText(text).then(function() {
        showToast('コピーしました');
      });
    }

    function downloadSVG() {
      var blob = new Blob([currentSVG], { type: 'image/svg+xml' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'wave.svg';
      a.click();
      URL.revokeObjectURL(url);
    }

    function showToast(msg) {
      var toast = document.getElementById('copyToast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(function() { toast.classList.remove('show'); }, 2000);
    }

    function regenerate() {
      seed = Math.random();
      generateWave();
    }

    // Slider event listeners
    ['waveHeight', 'waveFreq', 'layerCount', 'randomness'].forEach(function(id) {
      var el = document.getElementById(id);
      el.addEventListener('input', function() {
        document.getElementById(id + 'Val').textContent = el.value;
        if (id === 'layerCount') {
          var oldColors = getLayerColors();
          updateLayerColorInputs(oldColors);
        }
        generateWave();
      });
    });

    document.getElementById('bgColor').addEventListener('input', generateWave);
    document.getElementById('flipWave').addEventListener('change', generateWave);

    // Initialize
    updateLayerColorInputs(['#0077b6', '#00b4d8', '#90e0ef']);
    generateWave();
  </script>
</body>
