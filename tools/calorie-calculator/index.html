  <main>
    <h1>カロリー計算</h1>
    <h2>無料オンライン食事カロリー計算ツール</h2>
    <p class="tool-description">食品を検索して追加するだけで、1食・1日の摂取カロリーを簡単に計算。PFC（タンパク質・脂質・炭水化物）バランスも表示。ダイエットや食事管理に。無料・登録不要・ブラウザだけで完結します。</p>

    <div class="tool-area">
      <div class="search-area">
        <label>食品を検索して追加</label>
        <div class="search-row">
          <input type="text" id="food-search" placeholder="食品名を入力（例：ごはん、鶏肉、パン）" autocomplete="off">
        </div>
        <div class="suggestions" id="suggestions"></div>
      </div>

      <div class="category-tabs" id="category-tabs"></div>

      <div class="add-row" id="add-row" style="display:none;">
        <div style="flex:2;">
          <span id="selected-food-name" style="font-weight:600;"></span>
          <span id="selected-food-cal" style="font-size:0.85rem;color:var(--text-muted);margin-left:8px;"></span>
        </div>
        <div class="input-field">
          <label for="food-amount">量</label>
          <input type="number" id="food-amount" value="1" min="0.1" step="0.1">
        </div>
        <div class="input-field">
          <label for="food-unit">単位</label>
          <input type="text" id="food-unit" readonly>
        </div>
        <select class="meal-select" id="meal-type">
          <option value="breakfast">朝食</option>
          <option value="lunch">昼食</option>
          <option value="dinner">夕食</option>
          <option value="snack">間食</option>
        </select>
        <button class="btn" onclick="addFood()" style="white-space:nowrap;">追加</button>
      </div>

      <div class="total-bar">
        <span class="total-label">合計カロリー</span>
        <span class="total-value" id="total-calories">0 kcal</span>
      </div>

      <div class="pfc-bar">
        <div class="pfc-item pfc-protein">
          <div class="pfc-label">タンパク質</div>
          <div class="pfc-value" id="total-protein">0 g</div>
        </div>
        <div class="pfc-item pfc-fat">
          <div class="pfc-label">脂質</div>
          <div class="pfc-value" id="total-fat">0 g</div>
        </div>
        <div class="pfc-item pfc-carb">
          <div class="pfc-label">炭水化物</div>
          <div class="pfc-value" id="total-carb">0 g</div>
        </div>
      </div>

      <div class="meal-list" id="meal-list">
        <div class="meal-section" id="section-breakfast">
          <h3>朝食 <span class="meal-total" id="total-breakfast">0 kcal</span></h3>
          <div id="list-breakfast"></div>
        </div>
        <div class="meal-section" id="section-lunch">
          <h3>昼食 <span class="meal-total" id="total-lunch">0 kcal</span></h3>
          <div id="list-lunch"></div>
        </div>
        <div class="meal-section" id="section-dinner">
          <h3>夕食 <span class="meal-total" id="total-dinner">0 kcal</span></h3>
          <div id="list-dinner"></div>
        </div>
        <div class="meal-section" id="section-snack">
          <h3>間食 <span class="meal-total" id="total-snack">0 kcal</span></h3>
          <div id="list-snack"></div>
        </div>
      </div>

      <div class="btn-group" style="margin-top:16px;">
        <button class="btn btn-secondary" onclick="clearAll()">すべてクリア</button>
      </div>
    </div>

    <section style="margin-top:40px;">
      <h2 style="font-size:1.2rem;margin-top:24px;margin-bottom:12px;">他のツール</h2>
      <div class="tool-grid">
        <a href="../bmi-calculator/" class="tool-card">
          <h3 style="font-size:1rem;margin:0;">BMI計算</h3>
          <p>身長と体重からBMIを計算</p>
        </a>
        <a href="../tdee-calculator/" class="tool-card">
          <h3 style="font-size:1rem;margin:0;">TDEE計算</h3>
          <p>1日の消費カロリーを計算</p>
        </a>
        <a href="../unit-converter/" class="tool-card">
          <h3 style="font-size:1rem;margin:0;">単位変換ツール</h3>
          <p>長さ・重さ・温度などの単位を変換</p>
        </a>
      </div>
    </section>
  </main>

      ['みかん（1個）',34,'個',0.5,0.1,8.6,'果物'],

      // 飲み物
      ['コーヒー（ブラック）',6,'杯',0.3,0,0.9,'飲み物'],
      ['コーヒー（砂糖ミルク）',36,'杯',0.5,1.0,5.5,'飲み物'],

      ['ビール（350ml）',140,'本',1.1,0,10.9,'飲み物'],
      ['緑茶',2,'杯',0.1,0,0.3,'飲み物'],

      // お菓子・デザート
      ['ショートケーキ（1切）',366,'切れ',5.5,21.8,37.5,'菓子'],
      ['チョコレート（1枚50g）',279,'枚',3.5,17.4,27.6,'菓子'],
      ['ポテトチップス（1袋60g）',332,'袋',2.8,21.6,31.7,'菓子'],
      ['アイスクリーム（1個）',196,'個',3.5,10.0,23.2,'菓子'],
      ['大福（1個）',147,'個',3.3,0.4,33.5,'菓子'],
      ['せんべい（2枚）',74,'枚×2',1.5,0.4,16.0,'菓子'],
      ['どら焼き（1個）',196,'個',4.2,2.5,39.8,'菓子']
    ];

    var selectedFood = null;
    var mealItems = { breakfast: [], lunch: [], dinner: [], snack: [] };
    var categories = ['全て','主食','肉','魚','卵・乳','野菜','果物','飲み物','菓子'];

    // Build category tabs
    var tabContainer = document.getElementById('category-tabs');
    categories.forEach(function(cat, i) {
      var btn = document.createElement('button');
      btn.className = 'cat-tab' + (i === 0 ? ' active' : '');
      btn.textContent = cat;
      btn.onclick = function() {
        document.querySelectorAll('.cat-tab').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        showCategoryFoods(cat);
      };
      tabContainer.appendChild(btn);
    });

    function showCategoryFoods(cat) {
      var sug = document.getElementById('suggestions');
      sug.innerHTML = '';
      var filtered = cat === '全て' ? FOODS : FOODS.filter(function(f) { return f[6] === cat; });
      filtered.forEach(function(food) {
        var div = document.createElement('div');
        div.className = 'suggestion-item';
        div.innerHTML = '<span>' + food[0] + '</span><span class="cal">' + food[1] + ' kcal/' + food[2] + '</span>';
        div.onclick = function() { selectFood(food); };
        sug.appendChild(div);
      });
      sug.classList.add('show');
    }

    // Search
    var searchInput = document.getElementById('food-search');
    searchInput.addEventListener('input', function() {
      var query = this.value.trim();
      var sug = document.getElementById('suggestions');
      document.querySelectorAll('.cat-tab').forEach(function(b) { b.classList.remove('active'); });

      if (!query) {
        sug.classList.remove('show');
        return;
      }
      sug.innerHTML = '';
      var matched = FOODS.filter(function(f) { return f[0].indexOf(query) >= 0; });
      if (matched.length === 0) {
        sug.innerHTML = '<div style="padding:8px 12px;color:var(--text-muted);font-size:0.85rem;">該当する食品が見つかりません</div>';
      }
      matched.forEach(function(food) {
        var div = document.createElement('div');
        div.className = 'suggestion-item';
        div.innerHTML = '<span>' + food[0] + '</span><span class="cal">' + food[1] + ' kcal/' + food[2] + '</span>';
        div.onclick = function() { selectFood(food); };
        sug.appendChild(div);
      });
      sug.classList.add('show');
    });

    function selectFood(food) {
      selectedFood = food;
      document.getElementById('selected-food-name').textContent = food[0];
      document.getElementById('selected-food-cal').textContent = '(' + food[1] + ' kcal/' + food[2] + ')';
      document.getElementById('food-amount').value = 1;
      document.getElementById('food-unit').value = food[2];
      document.getElementById('add-row').style.display = 'flex';
      document.getElementById('suggestions').classList.remove('show');
      document.getElementById('food-search').value = '';

      // Auto-select meal type by time
      var h = new Date().getHours();
      if (h < 10) document.getElementById('meal-type').value = 'breakfast';
      else if (h < 15) document.getElementById('meal-type').value = 'lunch';
      else if (h < 20) document.getElementById('meal-type').value = 'dinner';
      else document.getElementById('meal-type').value = 'snack';
    }

    function addFood() {
      if (!selectedFood) return;
      var amount = parseFloat(document.getElementById('food-amount').value);
      if (!amount || amount <= 0) { alert('量を正しく入力してください。'); return; }

      var meal = document.getElementById('meal-type').value;
      var item = {
        name: selectedFood[0],
        cal: Math.round(selectedFood[1] * amount),
        protein: Math.round(selectedFood[3] * amount * 10) / 10,
        fat: Math.round(selectedFood[4] * amount * 10) / 10,
        carb: Math.round(selectedFood[5] * amount * 10) / 10,
        amount: amount,
        unit: selectedFood[2]
      };
      mealItems[meal].push(item);
      document.getElementById('add-row').style.display = 'none';
      selectedFood = null;
      renderMeals();
    }

    function removeFood(meal, index) {
      mealItems[meal].splice(index, 1);
      renderMeals();
    }

    function renderMeals() {
      var totalCal = 0, totalP = 0, totalF = 0, totalC = 0;

      ['breakfast', 'lunch', 'dinner', 'snack'].forEach(function(meal) {
        var list = document.getElementById('list-' + meal);
        list.innerHTML = '';
        var mealCal = 0;

        mealItems[meal].forEach(function(item, idx) {
          mealCal += item.cal;
          totalCal += item.cal;
          totalP += item.protein;
          totalF += item.fat;
          totalC += item.carb;

          var div = document.createElement('div');
          div.className = 'food-item';
          div.innerHTML = '<span class="food-name">' + item.name +
            (item.amount !== 1 ? ' x' + item.amount : '') +
            '</span><span class="food-cal">' + item.cal + ' kcal</span>' +
            '<button class="remove" onclick="removeFood(\'' + meal + '\',' + idx + ')">x</button>';
          list.appendChild(div);
        });

        document.getElementById('total-' + meal).textContent = mealCal + ' kcal';
      });

      document.getElementById('total-calories').textContent = totalCal + ' kcal';
      document.getElementById('total-protein').textContent = Math.round(totalP * 10) / 10 + ' g';
      document.getElementById('total-fat').textContent = Math.round(totalF * 10) / 10 + ' g';
      document.getElementById('total-carb').textContent = Math.round(totalC * 10) / 10 + ' g';
    }

    function clearAll() {
      mealItems = { breakfast: [], lunch: [], dinner: [], snack: [] };
      document.getElementById('add-row').style.display = 'none';
      selectedFood = null;
      renderMeals();
    }

    // Close suggestions when clicking outside
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.search-area') && !e.target.closest('.category-tabs')) {
        document.getElementById('suggestions').classList.remove('show');
      }
    });
  </script>
  <script src="../../common/affiliate.js"></script>
  <script src="../../common/newsletter.js" defer></script>
</body>
</html>
