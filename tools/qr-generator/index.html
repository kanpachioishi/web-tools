  <link rel="stylesheet" href="../../common/style.css">

<body>
  <script src="../../common/header.js"></script>
  <script src="../../common/breadcrumb.js"></script>
  <main>
    <h1>QRコード生成ツール</h1>
    <h2>無料オンラインQRコード作成ツール</h2>
    <p class="tool-description">URLやテキストを入力するだけでQRコードを即座に生成。PNG画像としてダウンロードも可能です。名刺・チラシ・SNS共有に便利。無料・登録不要・ブラウザだけで完結します。</p>

    <div class="tool-area">
      <label for="qr-input">テキストまたはURLを入力</label>
      <input type="text" id="qr-input" placeholder="https://example.com">

      <div class="btn-group">
        <button class="btn" onclick="generateQR()">QRコードを生成</button>
        <button class="btn btn-secondary" onclick="downloadQR()">ダウンロード</button>
      </div>

      <div id="qr-result" style="margin-top:20px;text-align:center;"></div>
    </div>
    <section style="margin-top:40px;">
      <h2 style="font-size:1.2rem;margin-top:24px;margin-bottom:12px;">他のツール</h2>
      <div class="tool-grid">
        <a href="../password-generator/" class="tool-card">
          <h3 style="font-size:1rem;margin:0;">パスワード生成ツール</h3>
          <p>安全なランダムパスワードを自動作成</p>
        </a>
        <a href="../url-encode/" class="tool-card">
          <h3 style="font-size:1rem;margin:0;">URLエンコード・デコード</h3>
          <p>URLエンコードとデコードを相互変換</p>
        </a>
        <a href="../base64/" class="tool-card">
          <h3 style="font-size:1rem;margin:0;">Base64エンコード・デコード</h3>
          <p>テキストをBase64に変換・逆変換</p>
        </a>
      </div>
    </section>
  </main>
  <script src="../../common/footer.js"></script>
  <script>
    // QRコード生成（Canvas直接描画、外部ライブラリ不要の簡易版）
    // Google Charts APIを利用
    function generateQR() {
      const text = document.getElementById('qr-input').value.trim();
      if (!text) return;
      const container = document.getElementById('qr-result');
      const size = 300;
      const url = 'https://api.qrserver.com/v1/create-qr-code/?size=' + size + 'x' + size + '&data=' + encodeURIComponent(text);
      container.innerHTML = '<img id="qr-img" src="' + url + '" alt="QRコード" style="max-width:100%;border-radius:8px;">';
    }

    function downloadQR() {
      const img = document.getElementById('qr-img');
      if (!img) return;
      const a = document.createElement('a');
      a.href = img.src;
      a.download = 'qrcode.png';
      a.click();
    }
  </script>
</body>
