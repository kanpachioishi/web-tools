      ]
    };

    let currentCategory = null;

    function init() {
      const tabsEl = document.getElementById('category-tabs');
      // All tab
      const allTab = document.createElement('button');
      allTab.className = 'category-tab active';
      allTab.textContent = 'すべて';
      allTab.onclick = () => selectCategory(null, allTab);
      tabsEl.appendChild(allTab);

      for (const cat of Object.keys(EMOJI_DATA)) {
        const label = cat.split(' ')[0];
        const tab = document.createElement('button');
        tab.className = 'category-tab';
        tab.textContent = label;
        tab.onclick = () => selectCategory(cat, tab);
        tabsEl.appendChild(tab);
      }
      renderEmojis();
    }

    function selectCategory(cat, tabEl) {
      currentCategory = cat;
      document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
      tabEl.classList.add('active');
      renderEmojis();
    }

    function renderEmojis() {
      const query = document.getElementById('emoji-search').value.toLowerCase().trim();
      const grid = document.getElementById('emoji-grid');
      grid.innerHTML = '';

      let emojis = [];
      if (currentCategory) {
        emojis = EMOJI_DATA[currentCategory];
      } else {
        for (const cat of Object.keys(EMOJI_DATA)) {
          emojis = emojis.concat(EMOJI_DATA[cat]);
        }
      }

      if (query) {
        emojis = emojis.filter(item => item.k.toLowerCase().includes(query));
      }

      document.getElementById('emoji-count').textContent = emojis.length + ' 件の絵文字';

      for (const item of emojis) {
        const btn = document.createElement('button');
        btn.className = 'emoji-btn';
        btn.textContent = item.e;
        btn.title = item.k;
        btn.onclick = () => copyEmoji(item.e);
        grid.appendChild(btn);
      }

      if (emojis.length === 0) {
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#999;padding:40px;">該当する絵文字が見つかりません</div>';
      }
    }

    function copyEmoji(emoji) {
      navigator.clipboard.writeText(emoji).then(() => {
        showToast(emoji + ' をコピーしました');
      });
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1500);
    }

    document.getElementById('emoji-search').addEventListener('input', renderEmojis);
    init();
  </script>
</body>
</html>
