<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web便利ツール集 | 無料オンラインツール</title>
  <meta name="description" content="文字数カウント、JSON整形、QRコード生成など、便利なWebツールを無料で提供。ブラウザだけで使えるシンプルなオンラインツール集。">
  <meta property="og:title" content="Web便利ツール集 | 無料オンラインツール">
  <meta property="og:description" content="便利なWebツールを無料で提供。ブラウザだけで使えるシンプルなオンラインツール集。">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="common/style.css">
</head>
<body>
  <script src="common/header.js"></script>
  <main>
    <h1>Web便利ツール集</h1>
    <p class="tool-description">ブラウザだけで使える無料のオンラインツール。インストール不要、すべてクライアントサイドで動作します。</p>

    <div class="tool-grid">
      <a href="tools/char-counter/" class="tool-card">
        <h2>文字数カウンター</h2>
        <p>テキストの文字数・単語数・行数をリアルタイムでカウント</p>
      </a>
      <a href="tools/json-formatter/" class="tool-card">
        <h2>JSON整形ツール</h2>
        <p>JSONデータを見やすく整形・圧縮（Minify）</p>
      </a>
      <a href="tools/qr-generator/" class="tool-card">
        <h2>QRコード生成</h2>
        <p>テキストやURLからQRコードを生成・ダウンロード</p>
      </a>
      <a href="tools/password-generator/" class="tool-card">
        <h2>パスワード生成</h2>
        <p>安全なランダムパスワードをワンクリックで生成</p>
      </a>
      <a href="tools/color-converter/" class="tool-card">
        <h2>カラーコード変換</h2>
        <p>HEX・RGB・HSLのカラーコードを相互変換</p>
      </a>
    </div>
  </main>
  <script src="common/footer.js"></script>
</body>
</html>
