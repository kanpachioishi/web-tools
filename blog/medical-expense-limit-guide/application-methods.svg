<svg viewBox="0 0 620 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
          <title>高額療養費 申請方法の3パターン比較</title>
          <rect x="0" y="0" width="620" height="300" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
          <text x="310" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">申請方法の3パターン比較</text>
          <!-- パターン1: 事後申請 -->
          <rect x="15" y="40" width="590" height="72" rx="6" fill="#fff" stroke="#ffa94d" stroke-width="1.5"/>
          <rect x="15" y="40" width="120" height="72" rx="6" fill="#fff3e0"/>
          <rect x="15" y="40" width="120" height="72" rx="6" fill="#ffa94d" opacity="0.15" stroke="#ffa94d" stroke-width="1.5"/>
          <text x="75" y="62" text-anchor="middle" font-size="11" font-weight="bold" fill="#e8590c">パターン1</text>
          <text x="75" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#d9480f">事後申請</text>
          <text x="75" y="98" text-anchor="middle" font-size="16" fill="#e8590c">&#9733;</text>
          <!-- フロー矢印 -->
          <rect x="148" y="56" width="105" height="28" rx="14" fill="#ffd8a8"/>
          <text x="200" y="74" text-anchor="middle" font-size="10" fill="#d9480f">窓口で3割払う</text>
          <text x="260" y="74" font-size="13" fill="#adb5bd">&#9654;</text>
          <rect x="274" y="56" width="105" height="28" rx="14" fill="#ffd8a8"/>
          <text x="326" y="74" text-anchor="middle" font-size="10" fill="#d9480f">後日申請する</text>
          <text x="386" y="74" font-size="13" fill="#adb5bd">&#9654;</text>
          <rect x="400" y="56" width="120" height="28" rx="14" fill="#ffd8a8"/>
          <text x="460" y="74" text-anchor="middle" font-size="10" fill="#d9480f">差額が振込</text>
          <text x="535" y="74" font-size="10" fill="#868e96">（2〜3か月後）</text>
          <!-- パターン2: 限度額適用認定証 -->
          <rect x="15" y="122" width="590" height="72" rx="6" fill="#fff" stroke="#4dabf7" stroke-width="1.5"/>
          <rect x="15" y="122" width="120" height="72" rx="6" fill="#e7f5ff"/>
          <rect x="15" y="122" width="120" height="72" rx="6" fill="#4dabf7" opacity="0.15" stroke="#4dabf7" stroke-width="1.5"/>
          <text x="75" y="144" text-anchor="middle" font-size="11" font-weight="bold" fill="#1971c2">パターン2</text>
          <text x="75" y="160" text-anchor="middle" font-size="11" font-weight="bold" fill="#1864ab">限度額適用</text>
          <text x="75" y="174" text-anchor="middle" font-size="11" font-weight="bold" fill="#1864ab">認定証</text>
          <text x="75" y="188" text-anchor="middle" font-size="14" fill="#1971c2">&#9733;&#9733;</text>
          <!-- フロー -->
          <rect x="148" y="140" width="115" height="28" rx="14" fill="#a5d8ff"/>
          <text x="205" y="158" text-anchor="middle" font-size="10" fill="#1864ab">事前に認定証を取得</text>
          <text x="270" y="158" font-size="13" fill="#adb5bd">&#9654;</text>
          <rect x="284" y="140" width="160" height="28" rx="14" fill="#a5d8ff"/>
          <text x="364" y="158" text-anchor="middle" font-size="10" fill="#1864ab">窓口で限度額だけ払う</text>
          <text x="455" y="158" font-size="10" fill="#868e96">（立替不要!）</text>
          <!-- パターン3: マイナ保険証 -->
          <rect x="15" y="204" width="590" height="72" rx="6" fill="#fff" stroke="#51cf66" stroke-width="1.5"/>
          <rect x="15" y="204" width="120" height="72" rx="6" fill="#ebfbee"/>
          <rect x="15" y="204" width="120" height="72" rx="6" fill="#51cf66" opacity="0.15" stroke="#51cf66" stroke-width="1.5"/>
          <text x="75" y="226" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b8a3e">パターン3</text>
          <text x="75" y="242" text-anchor="middle" font-size="11" font-weight="bold" fill="#1b7a30">マイナ保険証</text>
          <text x="75" y="262" text-anchor="middle" font-size="14" fill="#2b8a3e">&#9733;&#9733;&#9733;</text>
          <!-- フロー -->
          <rect x="148" y="222" width="150" height="28" rx="14" fill="#b2f2bb"/>
          <text x="223" y="240" text-anchor="middle" font-size="10" fill="#1b7a30">マイナンバーカードを提示</text>
          <text x="305" y="240" font-size="13" fill="#adb5bd">&#9654;</text>
          <rect x="319" y="222" width="150" height="28" rx="14" fill="#b2f2bb"/>
          <text x="394" y="240" text-anchor="middle" font-size="10" fill="#1b7a30">自動で限度額適用</text>
          <text x="480" y="240" font-size="10" fill="#2b8a3e" font-weight="bold">おすすめ!</text>
          <!-- 凡例 -->
          <text x="310" y="293" text-anchor="middle" font-size="11" fill="#868e96">★が多いほどおすすめ（手続きの簡単さ・立替負担の少なさ）</text>
        </svg>
