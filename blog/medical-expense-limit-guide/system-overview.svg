<svg viewBox="0 0 620 280" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
          <title>高額療養費制度の仕組み（医療費100万円の場合）</title>
          <!-- 背景 -->
          <rect x="0" y="0" width="620" height="280" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
          <!-- タイトル -->
          <text x="310" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">医療費100万円の場合（年収500万・区分ウ）</text>
          <!-- 医療費全体バー -->
          <text x="20" y="62" font-size="12" fill="#666">医療費総額 100万円</text>
          <rect x="20" y="70" width="580" height="32" rx="4" fill="#e9ecef" stroke="#ced4da" stroke-width="1"/>
          <!-- 保険負担 -->
          <rect x="20" y="70" width="406" height="32" rx="4" fill="#4dabf7" opacity="0.8"/>
          <text x="223" y="91" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">健康保険が負担（7割）: 70万円</text>
          <!-- 窓口負担 -->
          <rect x="426" y="70" width="174" height="32" rx="4" fill="#ff8787" opacity="0.85"/>
          <text x="513" y="91" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">窓口負担（3割）: 30万円</text>
          <!-- 矢印と説明 -->
          <line x1="513" y1="102" x2="513" y2="125" stroke="#868e96" stroke-width="1.5" stroke-dasharray="4,3"/>
          <text x="310" y="142" text-anchor="middle" font-size="13" fill="#495057">窓口で支払った30万円の内訳は？</text>
          <!-- 内訳バー -->
          <rect x="130" y="155" width="460" height="40" rx="4" fill="#e9ecef" stroke="#ced4da" stroke-width="1"/>
          <!-- 実質負担（自己負担限度額） -->
          <rect x="130" y="155" width="88" height="40" rx="4" fill="#ff6b6b"/>
          <text x="174" y="178" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">実質負担</text>
          <text x="174" y="191" text-anchor="middle" font-size="9" fill="#fff">87,430円</text>
          <!-- 高額療養費として戻る -->
          <rect x="218" y="155" width="372" height="40" rx="4" fill="#51cf66"/>
          <text x="404" y="178" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">高額療養費として戻る: 212,570円</text>
          <!-- ラベル -->
          <text x="20" y="178" font-size="11" fill="#495057" font-weight="bold">30万円</text>
          <!-- 下の補足 -->
          <rect x="130" y="210" width="88" height="8" rx="2" fill="#ff6b6b"/>
          <text x="228" y="218" font-size="11" fill="#495057">= 自己負担限度額（これ以上は払わなくてOK）</text>
          <rect x="130" y="230" width="88" height="8" rx="2" fill="#51cf66"/>
          <text x="228" y="238" font-size="11" fill="#495057">= 申請すれば後から戻ってくるお金</text>
          <text x="310" y="268" text-anchor="middle" font-size="11" fill="#868e96">※ 限度額は80,100円＋（医療費−267,000円）×1% で計算</text>
        </svg>
