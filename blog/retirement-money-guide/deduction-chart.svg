<svg viewBox="0 0 620 280" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
          <!-- 軸 -->
          <line x1="70" y1="210" x2="590" y2="210" stroke="#334155" stroke-width="1.5"/>
          <line x1="70" y1="210" x2="70" y2="20" stroke="#334155" stroke-width="1.5"/>
          <!-- Y軸ラベル -->
          <text x="15" y="215" fill="#64748b" font-size="10">0万円</text>
          <line x1="65" y1="210" x2="70" y2="210" stroke="#94a3b8" stroke-width="1"/>
          <text x="5" y="170" fill="#64748b" font-size="10">500万円</text>
          <line x1="65" y1="167" x2="590" y2="167" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4"/>
          <text x="0" y="125" fill="#64748b" font-size="10">1000万円</text>
          <line x1="65" y1="124" x2="590" y2="124" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4"/>
          <text x="0" y="80" fill="#64748b" font-size="10">1500万円</text>
          <line x1="65" y1="81" x2="590" y2="81" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4"/>
          <text x="0" y="40" fill="#64748b" font-size="10">2000万円</text>
          <line x1="65" y1="38" x2="590" y2="38" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4"/>
          <!-- 棒グラフ: 各勤続年数 -->
          <!-- 5年: 200万 → 高さ = 200/2000 * 172 = 17.2 -->
          <rect x="90" y="192.8" width="50" height="17.2" rx="3" fill="#2563eb"/>
          <text x="115" y="187" text-anchor="middle" fill="#2563eb" font-size="10" font-weight="bold">200万</text>
          <text x="115" y="228" text-anchor="middle" fill="#334155" font-size="11">5年</text>
          <!-- 10年: 400万 → 34.4 -->
          <rect x="160" y="175.6" width="50" height="34.4" rx="3" fill="#2563eb"/>
          <text x="185" y="170" text-anchor="middle" fill="#2563eb" font-size="10" font-weight="bold">400万</text>
          <text x="185" y="228" text-anchor="middle" fill="#334155" font-size="11">10年</text>
          <!-- 15年: 600万 → 51.6 -->
          <rect x="230" y="158.4" width="50" height="51.6" rx="3" fill="#2563eb"/>
          <text x="255" y="153" text-anchor="middle" fill="#2563eb" font-size="10" font-weight="bold">600万</text>
          <text x="255" y="228" text-anchor="middle" fill="#334155" font-size="11">15年</text>
          <!-- 20年: 800万 → 68.8 -->
          <rect x="300" y="141.2" width="50" height="68.8" rx="3" fill="#2563eb"/>
          <text x="325" y="136" text-anchor="middle" fill="#2563eb" font-size="10" font-weight="bold">800万</text>
          <text x="325" y="228" text-anchor="middle" fill="#334155" font-size="11">20年</text>
          <!-- 25年: 1150万 → 98.9 -->
          <rect x="370" y="111.1" width="50" height="98.9" rx="3" fill="#7c3aed"/>
          <text x="395" y="106" text-anchor="middle" fill="#7c3aed" font-size="10" font-weight="bold">1150万</text>
          <text x="395" y="228" text-anchor="middle" fill="#334155" font-size="11">25年</text>
          <!-- 30年: 1500万 → 129 -->
          <rect x="440" y="81" width="50" height="129" rx="3" fill="#7c3aed"/>
          <text x="465" y="76" text-anchor="middle" fill="#7c3aed" font-size="10" font-weight="bold">1500万</text>
          <text x="465" y="228" text-anchor="middle" fill="#334155" font-size="11">30年</text>
          <!-- 35年: 1850万 → 159.1 -->
          <rect x="510" y="50.9" width="50" height="159.1" rx="3" fill="#7c3aed"/>
          <text x="535" y="46" text-anchor="middle" fill="#7c3aed" font-size="10" font-weight="bold">1850万</text>
          <text x="535" y="228" text-anchor="middle" fill="#334155" font-size="11">35年</text>
          <!-- 20年の境界注記 -->
          <line x1="345" y1="240" x2="345" y2="255" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4"/>
          <text x="220" y="268" fill="#dc2626" font-size="11" font-weight="bold">← 40万円/年</text>
          <text x="390" y="268" fill="#dc2626" font-size="11" font-weight="bold">70万円/年に増加 →</text>
        </svg>
