<svg viewBox="0 0 620 380" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
          <defs>
            <marker id="arrow-ret" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
              <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
            </marker>
          </defs>
          <!-- ステップ1: 退職金（額面） -->
          <rect x="200" y="10" width="220" height="42" rx="8" fill="#2563eb"/>
          <text x="310" y="36" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">退職金（額面）</text>
          <line x1="310" y1="52" x2="310" y2="75" stroke="#334155" stroke-width="2" marker-end="url(#arrow-ret)"/>
          <!-- ステップ2: 退職所得控除を引く -->
          <rect x="200" y="75" width="220" height="42" rx="8" fill="#0891b2"/>
          <text x="310" y="101" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">退職所得控除を引く</text>
          <text x="470" y="101" fill="#64748b" font-size="11">退職金 − 控除額</text>
          <line x1="310" y1="117" x2="310" y2="140" stroke="#334155" stroke-width="2" marker-end="url(#arrow-ret)"/>
          <!-- ステップ3: 1/2にする -->
          <rect x="200" y="140" width="220" height="42" rx="8" fill="#7c3aed"/>
          <text x="310" y="166" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1/2 にする</text>
          <text x="470" y="166" fill="#64748b" font-size="11">（退職金−控除額）× 1/2</text>
          <line x1="310" y1="182" x2="310" y2="205" stroke="#334155" stroke-width="2" marker-end="url(#arrow-ret)"/>
          <!-- ステップ4: 課税退職所得 -->
          <rect x="200" y="205" width="220" height="42" rx="8" fill="#2563eb"/>
          <text x="310" y="231" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">課税退職所得</text>
          <line x1="310" y1="247" x2="310" y2="270" stroke="#334155" stroke-width="2" marker-end="url(#arrow-ret)"/>
          <!-- ステップ5: 所得税 + 住民税 -->
          <rect x="130" y="270" width="160" height="42" rx="8" fill="#dc2626"/>
          <text x="210" y="296" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">所得税（累進税率）</text>
          <rect x="330" y="270" width="160" height="42" rx="8" fill="#dc2626"/>
          <text x="410" y="296" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">住民税（10%）</text>
          <text x="470" y="296" fill="#64748b" font-size="11"></text>
          <line x1="210" y1="312" x2="310" y2="335" stroke="#334155" stroke-width="2"/>
          <line x1="410" y1="312" x2="310" y2="335" stroke="#334155" stroke-width="2"/>
          <line x1="310" y1="335" x2="310" y2="340" stroke="#334155" stroke-width="2" marker-end="url(#arrow-ret)"/>
          <!-- 手取り額 -->
          <rect x="200" y="340" width="220" height="36" rx="8" fill="#16a34a"/>
          <text x="310" y="364" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">手取り額</text>
        </svg>
