<svg viewBox="0 0 620 120" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
          <!-- 背景ライン -->
          <line x1="60" y1="50" x2="570" y2="50" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round"/>
          <!-- 1月 -->
          <circle cx="80" cy="50" r="16" fill="#2563eb"/>
          <text x="80" y="55" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">1月</text>
          <text x="80" y="85" text-anchor="middle" fill="#334155" font-size="10">源泉徴収票</text>
          <text x="80" y="98" text-anchor="middle" fill="#334155" font-size="10">受取</text>
          <!-- 2/16〜3/15 -->
          <rect x="175" y="34" width="120" height="32" rx="16" fill="#dc2626"/>
          <text x="235" y="55" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">2/16〜3/15</text>
          <text x="235" y="85" text-anchor="middle" fill="#334155" font-size="10">確定申告期間</text>
          <text x="235" y="98" text-anchor="middle" fill="#dc2626" font-size="10" font-weight="bold">（提出・納付期限）</text>
          <!-- 4〜5月 -->
          <circle cx="390" cy="50" r="16" fill="#16a34a"/>
          <text x="390" y="55" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">4-5月</text>
          <text x="390" y="85" text-anchor="middle" fill="#334155" font-size="10">所得税の還付</text>
          <text x="390" y="98" text-anchor="middle" fill="#334155" font-size="10">（振込）</text>
          <!-- 6月〜 -->
          <circle cx="530" cy="50" r="16" fill="#7c3aed"/>
          <text x="530" y="55" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">6月〜</text>
          <text x="530" y="85" text-anchor="middle" fill="#334155" font-size="10">住民税に</text>
          <text x="530" y="98" text-anchor="middle" fill="#334155" font-size="10">反映</text>
          <!-- 矢印 -->
          <polygon points="572,50 560,42 560,58" fill="#cbd5e1"/>
        </svg>
