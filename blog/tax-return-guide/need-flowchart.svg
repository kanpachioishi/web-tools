<svg viewBox="0 0 620 350" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
          <!-- 会社員ですか？ -->
          <rect x="210" y="10" width="200" height="44" rx="8" fill="#2563eb"/>
          <text x="310" y="38" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">会社員ですか？</text>
          <!-- はい矢印 -->
          <line x1="310" y1="54" x2="310" y2="80" stroke="#334155" stroke-width="2" marker-end="url(#arrow-tax)"/>
          <text x="322" y="72" font-size="12" fill="#334155">はい</text>
          <!-- いいえ矢印（左へ） -->
          <line x1="210" y1="32" x2="100" y2="32" stroke="#334155" stroke-width="2"/>
          <line x1="100" y1="32" x2="100" y2="130" stroke="#334155" stroke-width="2" marker-end="url(#arrow-tax)"/>
          <text x="150" y="26" font-size="12" fill="#334155">いいえ</text>
          <!-- フリーランス/自営業 → 確定申告必要 -->
          <rect x="20" y="130" width="160" height="44" rx="8" fill="#2563eb"/>
          <text x="100" y="150" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">フリーランス</text>
          <text x="100" y="167" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">自営業</text>
          <line x1="100" y1="174" x2="100" y2="210" stroke="#334155" stroke-width="2" marker-end="url(#arrow-tax)"/>
          <rect x="20" y="210" width="160" height="40" rx="8" fill="#dc2626"/>
          <text x="100" y="236" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">確定申告が必要</text>
          <!-- 副業収入20万超？ -->
          <rect x="210" y="80" width="200" height="44" rx="8" fill="#2563eb"/>
          <text x="310" y="108" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">副業所得が20万円超？</text>
          <!-- はい矢印（右へ） -->
          <line x1="410" y1="102" x2="470" y2="102" stroke="#334155" stroke-width="2"/>
          <line x1="470" y1="102" x2="470" y2="210" stroke="#334155" stroke-width="2" marker-end="url(#arrow-tax)"/>
          <text x="430" y="96" font-size="12" fill="#334155">はい</text>
          <rect x="390" y="210" width="160" height="40" rx="8" fill="#dc2626"/>
          <text x="470" y="236" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">確定申告が必要</text>
          <!-- いいえ矢印（下へ） -->
          <line x1="310" y1="124" x2="310" y2="160" stroke="#334155" stroke-width="2" marker-end="url(#arrow-tax)"/>
          <text x="322" y="148" font-size="12" fill="#334155">いいえ</text>
          <!-- 医療費10万超 or ふるさと納税6自治体以上？ -->
          <rect x="200" y="160" width="220" height="54" rx="8" fill="#2563eb"/>
          <text x="310" y="183" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">医療費10万超 or</text>
          <text x="310" y="200" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">ふるさと納税6自治体以上？</text>
          <!-- はい矢印 -->
          <line x1="310" y1="214" x2="310" y2="260" stroke="#334155" stroke-width="2" marker-end="url(#arrow-tax)"/>
          <text x="322" y="242" font-size="12" fill="#334155">はい</text>
          <!-- 確定申告するとお得 -->
          <rect x="220" y="260" width="180" height="40" rx="8" fill="#f59e0b"/>
          <text x="310" y="286" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">確定申告するとお得</text>
          <!-- いいえ矢印（右下へ） -->
          <line x1="420" y1="187" x2="520" y2="187" stroke="#334155" stroke-width="2"/>
          <line x1="520" y1="187" x2="520" y2="300" stroke="#334155" stroke-width="2" marker-end="url(#arrow-tax)"/>
          <text x="440" y="181" font-size="12" fill="#334155">いいえ</text>
          <rect x="440" y="300" width="160" height="40" rx="8" fill="#16a34a"/>
          <text x="520" y="326" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">確定申告は不要</text>
          <defs>
            <marker id="arrow-tax" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
              <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
            </marker>
          </defs>
        </svg>
