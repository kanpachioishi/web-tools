<svg viewBox="0 0 620 200" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
          <!-- 所得税 -->
          <rect x="10" y="10" width="290" height="180" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
          <text x="155" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#dc2626">所得税（国税）</text>
          <text x="155" y="62" text-anchor="middle" font-size="13" fill="#7f1d1d">税率: 累進5%〜45%</text>
          <text x="155" y="84" text-anchor="middle" font-size="13" fill="#7f1d1d">基礎控除: 48万円</text>
          <text x="155" y="106" text-anchor="middle" font-size="13" fill="#7f1d1d">配偶者控除: 38万円</text>
          <text x="155" y="128" text-anchor="middle" font-size="13" fill="#7f1d1d">納付先: 国</text>
          <text x="155" y="150" text-anchor="middle" font-size="13" fill="#7f1d1d">課税: 当年（源泉徴収）</text>
          <text x="155" y="178" text-anchor="middle" font-size="12" fill="#9ca3af">稼ぐほど税率が上がる</text>
          <!-- VS -->
          <text x="310" y="105" text-anchor="middle" font-size="20" font-weight="800" fill="#94a3b8">VS</text>
          <!-- 住民税 -->
          <rect x="320" y="10" width="290" height="180" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
          <text x="465" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#1d4ed8">住民税（地方税）</text>
          <text x="465" y="62" text-anchor="middle" font-size="13" fill="#1e3a5f">税率: 一律10%</text>
          <text x="465" y="84" text-anchor="middle" font-size="13" fill="#1e3a5f">基礎控除: 43万円</text>
          <text x="465" y="106" text-anchor="middle" font-size="13" fill="#1e3a5f">配偶者控除: 33万円</text>
          <text x="465" y="128" text-anchor="middle" font-size="13" fill="#1e3a5f">納付先: 都道府県+市区町村</text>
          <text x="465" y="150" text-anchor="middle" font-size="13" fill="#1e3a5f">課税: 翌年6月〜</text>
          <text x="465" y="178" text-anchor="middle" font-size="12" fill="#9ca3af">控除額が所得税より少ない</text>
        </svg>
