<svg viewBox="0 0 620 340" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
          <!-- あなた -->
          <rect x="230" y="10" width="160" height="50" rx="25" fill="#2563eb"/>
          <text x="310" y="40" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">あなた</text>
          <!-- 寄付の矢印（右へ） -->
          <path d="M390,35 L480,35" stroke="#16a34a" stroke-width="3" fill="none" marker-end="url(#greenArrow)"/>
          <defs><marker id="greenArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#16a34a"/></marker></defs>
          <text x="435" y="28" text-anchor="middle" font-size="11" font-weight="600" fill="#16a34a">寄附</text>
          <!-- 好きな自治体 -->
          <rect x="480" y="10" width="130" height="50" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
          <text x="545" y="32" text-anchor="middle" font-size="13" font-weight="600" fill="#166534">好きな自治体</text>
          <text x="545" y="48" text-anchor="middle" font-size="11" fill="#166534">（全国どこでもOK）</text>
          <!-- 返礼品の矢印（左へ） -->
          <path d="M480,55 L390,80" stroke="#f59e0b" stroke-width="3" fill="none" marker-end="url(#goldArrow)"/>
          <defs><marker id="goldArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#f59e0b"/></marker></defs>
          <text x="460" y="78" text-anchor="middle" font-size="11" font-weight="600" fill="#b45309">返礼品</text>
          <!-- 控除の矢印（下へ） -->
          <path d="M310,60 L310,110" stroke="#dc2626" stroke-width="3" fill="none" marker-end="url(#redArrow)"/>
          <defs><marker id="redArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#dc2626"/></marker></defs>
          <text x="350" y="90" text-anchor="start" font-size="11" font-weight="600" fill="#dc2626">控除申請</text>
          <!-- 税金計算 -->
          <rect x="200" y="115" width="220" height="40" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
          <text x="310" y="140" text-anchor="middle" font-size="13" font-weight="600" fill="#991b1b">所得税 + 住民税から控除</text>
          <!-- 具体例ボックス -->
          <rect x="40" y="180" width="540" height="150" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
          <text x="310" y="205" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">例：50,000円を寄附した場合</text>
          <!-- 寄付額 -->
          <rect x="60" y="220" width="150" height="45" rx="6" fill="#dbeafe"/>
          <text x="135" y="238" text-anchor="middle" font-size="11" fill="#3b82f6">寄附額</text>
          <text x="135" y="257" text-anchor="middle" font-size="16" font-weight="700" fill="#1d4ed8">50,000円</text>
          <!-- マイナス -->
          <text x="225" y="248" text-anchor="middle" font-size="20" font-weight="700" fill="#94a3b8">−</text>
          <!-- 自己負担 -->
          <rect x="245" y="220" width="100" height="45" rx="6" fill="#fef3c7"/>
          <text x="295" y="238" text-anchor="middle" font-size="11" fill="#92400e">自己負担</text>
          <text x="295" y="257" text-anchor="middle" font-size="16" font-weight="700" fill="#92400e">2,000円</text>
          <!-- イコール -->
          <text x="360" y="248" text-anchor="middle" font-size="20" font-weight="700" fill="#94a3b8">=</text>
          <!-- 控除額 -->
          <rect x="380" y="220" width="180" height="45" rx="6" fill="#dcfce7"/>
          <text x="470" y="238" text-anchor="middle" font-size="11" fill="#166534">税金から戻る額</text>
          <text x="470" y="257" text-anchor="middle" font-size="16" font-weight="700" fill="#16a34a">48,000円</text>
          <!-- 返礼品 -->
          <rect x="60" y="278" width="500" height="40" rx="6" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
          <text x="310" y="303" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">さらに返礼品（寄附額の最大30%）= 約15,000円相当のお肉やお米がもらえる！</text>
        </svg>
