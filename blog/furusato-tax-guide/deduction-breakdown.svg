<svg viewBox="0 0 620 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
          <!-- 全体の枠 -->
          <rect x="10" y="10" width="600" height="280" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
          <text x="310" y="38" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">寄附額 50,000円 − 自己負担 2,000円 = 控除額 48,000円</text>
          <!-- 棒グラフ（横向き） -->
          <!-- 所得税 -->
          <rect x="40" y="60" width="120" height="50" rx="6" fill="#fca5a5" stroke="#ef4444" stroke-width="1.5"/>
          <text x="100" y="82" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">所得税から還付</text>
          <text x="100" y="100" text-anchor="middle" font-size="15" font-weight="700" fill="#dc2626">9,600円</text>
          <!-- 住民税（基本分） -->
          <rect x="170" y="60" width="60" height="50" rx="6" fill="#93c5fd" stroke="#3b82f6" stroke-width="1.5"/>
          <text x="200" y="82" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">住民税</text>
          <text x="200" y="97" text-anchor="middle" font-size="10" fill="#1e40af">基本分</text>
          <!-- 住民税（特例分） -->
          <rect x="240" y="60" width="340" height="50" rx="6" fill="#86efac" stroke="#22c55e" stroke-width="1.5"/>
          <text x="410" y="82" text-anchor="middle" font-size="13" font-weight="600" fill="#166534">住民税から控除（特例分）</text>
          <text x="410" y="100" text-anchor="middle" font-size="15" font-weight="700" fill="#16a34a">33,600円</text>
          <!-- 金額ラベル -->
          <text x="200" y="130" text-anchor="middle" font-size="11" fill="#3b82f6">4,800円</text>
          <!-- 計算式 -->
          <rect x="40" y="150" width="170" height="55" rx="6" fill="#fff1f2"/>
          <text x="125" y="170" text-anchor="middle" font-size="11" fill="#991b1b">(50,000-2,000) x 所得税率20%</text>
          <text x="125" y="192" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">= 9,600円</text>
          <rect x="220" y="150" width="170" height="55" rx="6" fill="#eff6ff"/>
          <text x="305" y="170" text-anchor="middle" font-size="11" fill="#1e40af">(50,000-2,000) x 10%</text>
          <text x="305" y="192" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">= 4,800円</text>
          <rect x="400" y="150" width="190" height="55" rx="6" fill="#f0fdf4"/>
          <text x="495" y="170" text-anchor="middle" font-size="11" fill="#166534">(50,000-2,000) x (100%-10%-20%)</text>
          <text x="495" y="192" text-anchor="middle" font-size="13" font-weight="700" fill="#16a34a">= 33,600円</text>
          <!-- 合計 -->
          <rect x="40" y="225" width="540" height="50" rx="8" fill="#16a34a"/>
          <text x="310" y="248" text-anchor="middle" font-size="13" fill="#bbf7d0">9,600 + 4,800 + 33,600 =</text>
          <text x="310" y="268" text-anchor="middle" font-size="18" font-weight="800" fill="#fff">合計 48,000円が税金から戻る（実質負担は2,000円だけ）</text>
        </svg>
