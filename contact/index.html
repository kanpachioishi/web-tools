<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta property="og:title" content="お問い合わせ | Web便利ツール集">
  <meta property="og:description" content="Web便利ツール集へのお問い合わせはこちらから。">
  <meta property="og:type" content="website">

<body>
  <script src="/common/header.js"></script>
  <main>
    <div class="breadcrumb">
      <a href="/">ホーム</a><span>›</span>お問い合わせ
    </div>
    <h1>お問い合わせ</h1>
    <p class="tool-description">当サイトに関するご質問、ご要望、不具合のご報告などは、以下の方法でお問い合わせください。</p>

    <div class="tool-area">
      <h2 style="font-size: 1.2rem; margin-bottom: 16px;">メールでのお問い合わせ</h2>
      <p style="margin-bottom: 16px;">以下のメールアドレスまでお気軽にご連絡ください。</p>
      <div style="text-align: center; margin: 24px 0;">
        <a href="mailto:simpletoolkit.contact@gmail.com" class="btn" style="text-decoration: none; font-size: 1.05rem; padding: 12px 28px;">
          simpletoolkit.contact@gmail.com
        </a>
      </div>
      <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 16px;">※ 返信までに数日いただく場合がございます。あらかじめご了承ください。</p>
    </div>

    <div class="tool-area" style="margin-top: 24px;">
      <h2 style="font-size: 1.2rem; margin-bottom: 16px;">お問い合わせの前に</h2>
      <ul style="padding-left: 20px; line-height: 2;">
        <li>ツールの不具合報告の際は、お使いのブラウザ名とバージョンもお知らせいただけると助かります。</li>
        <li>新しいツールのリクエストも歓迎しております。</li>
        <li>広告掲載やビジネスに関するお問い合わせもお気軽にどうぞ。</li>
      </ul>
    </div>
  </main>
  <script src="/common/footer.js"></script>
